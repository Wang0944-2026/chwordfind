<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國語找字遊戲 v1.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap');

        /* 莫蘭迪色系變數設定 */
        :root {
            --bg-base: #F4F1ED; /* 燕麥白/淺灰褐 */
            --bg-pattern: #EBE6DF; /* 稍深的燕麥色，用於背景圓點 */
            
            --text-main: #696561; /* 灰褐色文字 */
            --text-light: #9B9895; /* 淺灰褐色文字 */
            
            --panel-bg: #FFFFFF;
            --panel-border: #D8D2CB; /* 莫蘭迪淺棕邊框 */
            
            --grid-border: #BDB5AD; /* 莫蘭迪灰棕 */
            --cell-bg: #FCFBF9;
            --cell-border: #E8E4DF;
            --cell-hover: #F0EBE5;
            
            /* 互動狀態色 (低飽和) */
            --cell-selected-bg: #C1C9C8; /* 莫蘭迪灰藍綠 */
            --cell-selected-border: #9BA6A5;
            --cell-selected-text: #4A5554;
            
            --cell-found-bg: #D4A373; /* 大地色系 - 焦糖拿鐵 */
            --cell-found-border: #BC8A59;
            --cell-found-text: #FFFFFF;

            /* UI 元件色 */
            --btn-blue: #A8B8C2; /* 灰藍色 */
            --btn-blue-hover: #8A9CA8;
            --btn-purple: #C2B8CC; /* 藕紫色 */
            --btn-purple-hover: #A69AB2;
            --btn-green: #B5C4B1; /* 豆沙綠 */
            --btn-green-hover: #98A994;
            --btn-orange: #D4BBA5; /* 奶茶/杏色 */
            --btn-orange-hover: #BCA089;
            
            /* 大廳按鈕專用 */
            --lobby-btn-bg: #F8F6F4;
            --lobby-btn-border: #D4CFC9;
            --lobby-btn-hover: #E2DDD6;
        }

        body {
            font-family: 'Zen Maru Gothic', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(var(--bg-pattern) 20%, transparent 20%), 
                radial-gradient(var(--bg-pattern) 20%, transparent 20%);
            background-position: 0 0, 40px 40px;
            background-size: 80px 80px;
            overflow-x: hidden;
            touch-action: manipulation;
            user-select: none;
            color: var(--text-main);
        }

        /* 版權宣告 */
        .footer-version {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 0.85rem;
            color: var(--text-light);
            z-index: 9999;
            pointer-events: none;
            font-weight: bold;
        }

        /* ----- 大廳樣式 ----- */
        #lobby-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .lobby-panel {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(105, 101, 97, 0.08);
            max-width: 800px;
            width: 100%;
            text-align: center;
            border-top: 8px solid var(--grid-border);
        }

        .lesson-btn {
            background: var(--lobby-btn-bg);
            color: var(--text-main);
            border: 3px solid var(--lobby-btn-border);
            border-radius: 20px;
            padding: 20px;
            font-size: 1.25rem;
            font-weight: bold;
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 0 var(--lobby-btn-border);
        }

        .lesson-btn:hover {
            background: var(--lobby-btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 0 var(--lobby-btn-border);
        }
        
        .lesson-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--lobby-btn-border);
        }

        /* ----- 遊戲主要版面 ----- */
        #game-container {
            max-width: 1200px; /* 增加最大寬度，讓版面展開 */
            width: 100%;
            margin: 0 auto;
            min-height: 100vh;
            display: none; /* 預設隱藏 */
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* 頂部資訊列 */
        .header-panel {
            background: var(--panel-bg);
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 6px 0 var(--panel-border);
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 25px;
            width: 100%; /* 撐滿容器，配合 padding 達到距離兩側 20px */
            flex-wrap: wrap;
            justify-content: center;
        }

        .back-btn {
            background: var(--bg-base);
            color: var(--text-main);
            border: 2px solid var(--panel-border);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover { background: var(--lobby-btn-hover); }

        /* 字海網格 */
        .word-search-grid {
            display: grid;
            gap: 6px;
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(105, 101, 97, 0.08);
            border: 8px solid var(--grid-border);
            position: relative;
            touch-action: none;
            margin-bottom: 20px;
            /* 為了產生預覽線而設定的相對定位層 */
            z-index: 1;
        }

        .cell {
            width: clamp(35px, 8vmin, 50px);
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--cell-bg);
            border-radius: 12px;
            font-weight: bold;
            font-size: clamp(18px, 4vmin, 24px);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.15s ease;
            border: 2px solid var(--cell-border);
            box-shadow: 0 3px 0 var(--panel-border);
            z-index: 2; /* 確保字比預覽線高 */
        }

        .cell:hover:not(.found):not(.selected) {
            background-color: var(--cell-hover);
            transform: translateY(-2px);
        }

        .cell.selected {
            background-color: var(--cell-selected-bg);
            border-color: var(--cell-selected-border);
            color: var(--cell-selected-text);
            /* 強化：確保已經過關的字磚被點擊時，依然能明顯放大凸起 */
            transform: scale(1.1) !important; 
            box-shadow: 0 4px 0 var(--cell-selected-border) !important;
            filter: brightness(0.95);
            z-index: 10;
        }

        .cell.path-preview {
            transform: scale(1.08) translateY(-2px);
            background-color: var(--cell-hover);
            border-color: var(--cell-selected-border);
            z-index: 8;
            box-shadow: 0 4px 0 var(--panel-border);
        }

        .cell.found {
            background-color: var(--cell-found-bg) !important;
            border-color: var(--cell-found-border) !important;
            color: var(--cell-found-text) !important;
            box-shadow: none !important;
            animation: pop 0.4s ease;
        }

        /* 預覽連線樣式 */
        .preview-line {
            position: absolute;
            background-color: var(--cell-selected-bg);
            opacity: 0.5;
            z-index: 1;
            border-radius: 20px;
            pointer-events: none;
            transform-origin: left center;
        }

        /* 底部語詞清單 */
        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: flex-start; /* 從左至右自然排列 */
            width: 100%;
        }
        
        .word-tag {
            background: var(--panel-bg);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 1rem;
            color: var(--text-light);
            border: 2px dashed var(--panel-border);
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            position: relative; /* 為了放置皇冠 */
        }

        .word-tag.found {
            background: var(--cell-found-bg);
            color: var(--cell-found-text);
            border: 2px solid var(--cell-found-border);
            box-shadow: 0 4px 0 var(--cell-found-border);
            text-decoration: none; /* 移除刪除線 */
            opacity: 1;
        }
        
        .word-tag.found:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* 皇冠與加分特效 */
        .crown-icon {
            position: absolute;
            top: -12px;
            right: -10px;
            color: #F4D03F;
            font-size: 1.3rem;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
            transform: rotate(15deg);
            z-index: 10;
        }

        .plus-50 {
            display: inline-block;
            color: #2E7D32;
            font-weight: 900;
            margin-left: 8px;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 右側面板捲動控制 */
        .list-panel-box {
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 防止外框被撐破 */
        }
        
        .word-list-scroll {
            overflow-y: auto;
            overflow-x: hidden; /* 確保橫向不會出現不必要的捲軸 */
            flex: 1;
            padding-top: 16px;   /* 預留第一排小皇冠的上方空間 */
            padding-right: 16px; /* 預留右側小皇冠的空間 */
            padding-left: 4px;
            padding-bottom: 10px;
            align-content: flex-start; /* 讓內容從上方開始排 */
        }
        
        /* 美化捲動軸 */
        .word-list-scroll::-webkit-scrollbar { width: 6px; }
        .word-list-scroll::-webkit-scrollbar-track { background: var(--bg-base); border-radius: 10px; }
        .word-list-scroll::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 10px; }

        /* ----- Modal 樣式 ----- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(105, 101, 97, 0.6); /* 莫蘭迪半透明黑 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--panel-bg);
            padding: 35px 25px 25px 25px;
            border-radius: 30px;
            text-align: center;
            max-width: 90%;
            width: 450px;
            border: 8px solid var(--grid-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.show .modal-content {
            transform: scale(1);
        }

        .modal-header-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 12px;
            background: var(--btn-blue);
        }

        .meaning-box {
            background: var(--bg-base);
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
            color: var(--text-main);
            text-align: left;
            font-size: 1.1rem;
            line-height: 1.6;
            border-left: 5px solid var(--panel-border);
            width: 100%;
        }

        /* 內容顯示區共用樣式 */
        .content-box {
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
            text-align: left;
            font-size: 1rem;
            line-height: 1.6;
            width: 100%;
            display: none;
        }
        .content-box.show { display: block; animation: fadeIn 0.4s; }

        .box-sentence { background: #EDF1F4; border-left: 5px solid var(--btn-blue); color: #5B6B75; }
        .box-origin { background: #F4EFF5; border-left: 5px solid var(--btn-purple); color: #6D627A; }
        .box-quiz { background: #EEF3ED; border-left: 5px solid var(--btn-green); color: #586B54; }

        .quiz-option {
            background: white;
            border: 2px solid var(--panel-border);
            padding: 10px 12px;
            margin-top: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        
        .quiz-option:hover { background: var(--bg-base); }
        .quiz-option.correct { background: var(--cell-found-bg); border-color: var(--cell-found-border); color: var(--cell-found-text); }
        .quiz-option.wrong { background: #E8D6D6; border-color: #CFA3A3; color: #8A5A5A; }

        /* ----- 按鈕樣式 ----- */
        .btn {
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.15s;
            margin: 5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: none !important;
        }
        
        .btn:disabled {
            background-color: var(--grid-border) !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none;
            opacity: 0.7;
        }

        .btn-sentence { background: var(--btn-blue); box-shadow: 0 4px 0 #8DA0AC; }
        .btn-sentence:hover { background: var(--btn-blue-hover); }
        
        .btn-origin { background: var(--btn-purple); box-shadow: 0 4px 0 #A89CB5; }
        .btn-origin:hover { background: var(--btn-purple-hover); }

        .btn-quiz { background: var(--btn-green); box-shadow: 0 4px 0 #9DB099; }
        .btn-quiz:hover { background: var(--btn-green-hover); }

        .btn-hint {
            background: var(--btn-orange);
            box-shadow: 0 4px 0 #BAA28C;
            padding: 8px 16px;
            font-size: 0.95rem;
        }
        .btn-hint:hover { background: var(--btn-orange-hover); }

        /* ----- 填空測驗 Modal 樣式 ----- */
        #fill-blank-modal .modal-content {
            width: 800px;
            max-width: 95%;
            padding: 40px 30px;
            background: #FAFAFA;
        }

        .article-box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            text-align: left;
            font-size: 1.15rem;
            line-height: 2.2;
            color: var(--text-main);
            border: 2px dashed var(--panel-border);
            margin-bottom: 20px;
            width: 100%;
        }

        /* 空格樣式 */
        .dropzone {
            display: inline-block;
            min-width: 80px;
            height: 36px;
            margin: 0 6px;
            border-bottom: 3px solid var(--btn-blue);
            background: #EDF1F4;
            vertical-align: middle;
            text-align: center;
            line-height: 36px;
            border-radius: 8px 8px 0 0;
            color: var(--btn-blue);
            font-weight: bold;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .dropzone.active-target {
            background: #D5E1E8;
            border-bottom-color: var(--btn-orange);
        }

        .dropzone.correct {
            background: var(--cell-found-bg);
            border-bottom-color: var(--cell-found-border);
            color: white;
            pointer-events: none;
        }

        .dropzone.wrong {
            background: #FCE8E8;
            border-bottom-color: #E74C3C;
            color: #C0392B;
            animation: shake 0.4s;
        }

        /* 待選字詞庫 */
        .word-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            width: 100%;
            min-height: 60px;
            padding: 15px;
            background: var(--bg-base);
            border-radius: 15px;
        }

        .drag-word {
            background: var(--panel-bg);
            border: 2px solid var(--btn-blue);
            color: var(--btn-blue);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: grab;
            user-select: none;
            transition: all 0.2s;
            box-shadow: 0 4px 0 var(--btn-blue);
        }

        .drag-word:active { cursor: grabbing; transform: translateY(4px); box-shadow: none; }
        .drag-word.selected-for-touch { background: var(--btn-blue); color: white; transform: translateY(2px); box-shadow: 0 2px 0 var(--btn-blue-hover); }
        .drag-word.used { opacity: 0; pointer-events: none; }

        /* 載入畫面覆蓋層 */
        #init-loader {
            position: fixed;
            inset: 0;
            background: var(--bg-base);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        /* 煙火畫布 */
        canvas#fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 90;
        }

        /* 動畫 */
        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
        
        @keyframes pop {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

    </style>
</head>
<body>
    <!-- 版權與版本號宣告 -->
    <!-- 👉 更新版本號為 v1.7 -->
    <div class="footer-version">大榮老師製作 © 2026 | Version 1.7 (v1.7)</div>

    <!-- 初始載入畫面 -->
    <div id="init-loader">
        <i class="fas fa-circle-notch fa-spin text-5xl mb-4" style="color: var(--btn-blue)"></i>
        <h2 class="text-2xl font-bold">正在準備教材...</h2>
        <p class="mt-2 opacity-70" id="loader-msg">讀取雲端題庫中</p>
    </div>

    <!-- 過關煙火特效 -->
    <canvas id="fireworks"></canvas>

    <!-- 🛑 大廳畫面 (Lobby) 🛑 -->
    <div id="lobby-container">
        <div class="lobby-panel">
            <div class="inline-block p-4 rounded-full bg-white mb-4 shadow-sm border-2 border-gray-100">
                <i class="fas fa-leaf text-5xl" style="color: var(--btn-green)"></i>
            </div>
            <h1 class="text-4xl font-black mb-2 tracking-wider">語詞探索遊戲</h1>
            <p class="font-bold opacity-60 mb-8">請選擇你要挑戰的單元</p>
            
            <!-- 動態生成的關卡按鈕區 -->
            <div id="lesson-buttons" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Javascript 會自動產生按鈕 -->
            </div>
        </div>
    </div>

    <!-- 🛑 遊戲主要畫面 🛑 -->
    <div id="game-container">
        <!-- 頂部資訊列 -->
        <div class="header-panel flex justify-between">
            <button onclick="returnToLobby()" class="back-btn">
                <i class="fas fa-arrow-left"></i> <span class="hidden md:inline">返回選單</span>
            </button>
            
            <h1 id="game-title" class="text-xl md:text-2xl font-bold tracking-wider m-0">單元名稱</h1>
            
            <div class="flex items-center gap-3">
                <!-- 新增計時器 -->
                <div class="flex items-center gap-2 font-bold text-lg px-4 py-1 rounded-full bg-white border-2" style="border-color: var(--panel-border);">
                    <i class="fas fa-clock" style="color: var(--btn-blue)"></i> 
                    <span id="time-display">00:00</span>
                </div>
                <!-- 分數區 -->
                <div class="flex items-center gap-2 font-bold text-lg px-4 py-1 rounded-full bg-white border-2" style="border-color: var(--panel-border);">
                    <i class="fas fa-star" style="color: var(--btn-orange)"></i> 
                    <span id="score-display">0</span> 分
                </div>
            </div>
        </div>

        <div class="text-center mb-4">
            <p class="font-bold px-4 py-2 rounded-full inline-block bg-white border-2" style="border-color: var(--panel-border); color: var(--text-light);">
                <i class="fas fa-info-circle" style="color: var(--btn-blue)"></i> 玩法：點選語詞的「第一個字」，再點「最後一個字」即可連線
            </p>
        </div>

        <!-- 主遊戲區 (包含網格與按鈕) -->
        <div class="flex flex-col md:flex-row gap-8 w-full justify-center items-stretch" id="main-content-area">
            
            <!-- 左側：網格區 -->
            <div class="flex flex-col items-center relative shrink-0">
                <div id="grid-container" class="word-search-grid">
                    <!-- 預覽線會動態加入這裡 -->
                    <!-- Cell JS Generated -->
                </div>
            </div>

            <!-- 右側：語詞列表區 -->
            <div id="right-panel" class="list-panel-box bg-white p-6 rounded-3xl border-4" style="border-color: var(--panel-border); flex: 1; min-width: 300px;">

    <script>
        // ==========================================
        // ⚙️ 老師設定區：您的 Google Apps Script 網址

        // 👇 請將這裡替換成你剛剛「重新部署」所獲得的最新 GAS 網址
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbw3aOu9AJzVDdcmWBs9IPrnFClLD_UBnV4NgPlSW5h8PSLxAGkYUFcwnlLpaoYL4466/exec";
        
        // ==========================================
        // --- 呼叫 GAS 中繼站生成短文 ---
        // ==========================================
        // 🔒 前端再也看不到 API 金鑰了，全部由 GAS 後端處理！

        async function callGeminiAPI(promptText) {
            // 直接將請求發送給您的 GAS 網址
            const url = GAS_API_URL; 
            const delays = [1000, 2000, 3000]; // 最多重試 3 次

            for (let i = 0; i <= delays.length; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        // 使用 text/plain 可以避開瀏覽器煩人的 CORS 跨域擋截
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ prompt: promptText })
                    });
                    
                    if (!response.ok) throw new Error(`連線到 GAS 失敗 (HTTP ${response.status})`);
                    
                    const data = await response.json();
                    
                    // 檢查 GAS 是否回報 Gemini 發生錯誤
                    if (data.error) {
                        console.error("[GAS/API 錯誤詳情]:", data.error);
                        throw new Error(`AI 生成失敗`);
                    }
                    
                    // 成功拿回短文！
                    return data.text;
                } catch (error) {
                    if (i === delays.length) {
                        // 真的不行了，丟出最終錯誤讓畫面顯示警告
                        throw error;
                    }
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }
        
        // 備用預設題庫
        const fallbackData = [

                sentences: ["祝你這次期末考馬到成功拿到好成績！", "哥哥準備很久的比賽，一定能馬到成功。", "只要充滿信心，做什麼事情都能馬到成功。"],

            }
        ];

        // 系統變數
        let allWordData = []; 
        let currentLessonData = []; 
        let GRID_SIZE = 10;
        let grid = [];
        let placedWordsInfo = [];

        let score = 0;

        let previewLine = null;
        let currentModalWord = null;

        let selectedTouchWord = null;

            { bg: '#D4A373', border: '#BC8A59', text: '#FFFFFF' }, // 焦糖
            { bg: '#918476', border: '#736557', text: '#FFFFFF' }, // 深灰褐
            { bg: '#86A397', border: '#658277', text: '#FFFFFF' }, // 湖水灰綠
            { bg: '#B58C73', border: '#966E56', text: '#FFFFFF' }, // 奶茶棕
            { bg: '#787586', border: '#5A5768', text: '#FFFFFF' }, // 紫灰
            { bg: '#8EA178', border: '#6E8159', text: '#FFFFFF' }, // 抹茶
            { bg: '#BC7D73', border: '#9E5E55', text: '#FFFFFF' }, // 豆沙紅
            { bg: '#5D7A7C', border: '#405C5E', text: '#FFFFFF' }, // 墨綠灰
            { bg: '#C49871', border: '#A87A53', text: '#FFFFFF' }, // 麥田金
            { bg: '#857A8C', border: '#645A6B', text: '#FFFFFF' }, // 丁香灰
            { bg: '#748A7A', border: '#566B5C', text: '#FFFFFF' }, // 橄欖綠
            { bg: '#BD8A81', border: '#A16E65', text: '#FFFFFF' }, // 珊瑚灰

            { bg: '#B39169', border: '#94724A', text: '#FFFFFF' }, // 駝色
            { bg: '#817478', border: '#66595D', text: '#FFFFFF' }, // 鐵灰紅
            { bg: '#799386', border: '#5C7568', text: '#FFFFFF' }, // 薄荷灰

            { bg: '#697282', border: '#4C5564', text: '#FFFFFF' }, // 石板藍
            { bg: '#A79C6F', border: '#8A7D52', text: '#FFFFFF' }, // 芥末黃灰
            { bg: '#9C7A87', border: '#7E5B68', text: '#FFFFFF' }, // 玫瑰灰
            { bg: '#5C7463', border: '#3F5645', text: '#FFFFFF' }, // 森林灰綠
            { bg: '#BD9176', border: '#9E7257', text: '#FFFFFF' }, // 栗棕
            { bg: '#787C87', border: '#5A5E68', text: '#FFFFFF' }, // 鴿子灰
            { bg: '#8CA082', border: '#6E8264', text: '#FFFFFF' }, // 青草灰
            { bg: '#C47E82', border: '#A65F64', text: '#FFFFFF' }, // 莓果灰
            { bg: '#698486', border: '#4C6568', text: '#FFFFFF' }  // 冰川灰
        ];

        // 全域：點擊網格外部取消選擇
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.cell') && !e.target.classList.contains('preview-line') && !e.target.closest('.modal-content')) {
                clearSelection();
            }
        });

        window.onload = async function() {
            try {
                const response = await fetch(GAS_API_URL);
                if (!response.ok) throw new Error("網路連線異常");
                const data = await response.json();
                allWordData = processSheetData(data);
                
                if (allWordData.length === 0) throw new Error("讀取到的題庫為空");
            } catch (err) {
                console.log("ℹ️ " + err.message + "，使用預設展示題庫。");
                allWordData = fallbackData;
            }
            
            await new Promise(resolve => setTimeout(resolve, 500));
            document.getElementById('init-loader').style.display = 'none';
            renderLobby();
        };

        function processSheetData(data) {
            let processed = [];
            
            // 🛠️ 建立「超級防呆取值工具」：優先完全比對，避免抓錯相似欄位
            const getVal = (row, possibleKeys) => {
                let bestMatch = undefined;
                for (let key in row) {
                    let cleanKey = String(key).replace(/[\s\(\)（）]+/g, '').toLowerCase(); 
                    for (let pk of possibleKeys) {
                        let cleanPk = pk.toLowerCase();
                        if (cleanKey === cleanPk) return row[key]; // 完全比對最優先
                        if (cleanKey.includes(cleanPk)) bestMatch = row[key]; // 部分比對當作備案
                    }
                }
                return bestMatch;
            };

            data.forEach(row => {
                // 讀取語詞與單元
                let wordRaw = getVal(row, ['語詞', '單字', '成語']);
                if (!wordRaw || String(wordRaw).trim() === '') return;
                
                let unitName = getVal(row, ['單元名稱', '單元', '課名']) || "綜合單元";
                let word = String(wordRaw).trim();

                // 處理造句 (支援多欄位或換行)
                let sentences = [];
                for (let i = 1; i <= 5; i++) {
                    let s = getVal(row, [`造句${i}`]);
                    if (s) sentences.push(String(s).trim());
                }
                let sMain = getVal(row, ['造句']);
                if (sentences.length === 0 && sMain) {
                    sentences = String(sMain).split('\n').map(s => s.trim()).filter(s => s !== '');
                }
                if (sentences.length === 0) sentences.push(`這是一個關於「${word}」的造句。`);

                // 處理測驗選項與答案
                let opt1Raw = getVal(row, ['選項1', '選項一']);
                let opt2Raw = getVal(row, ['選項2', '選項二']);
                let opt3Raw = getVal(row, ['選項3', '選項三']);
                
                let opt1 = opt1Raw ? String(opt1Raw).trim() : "";
                let opt2 = opt2Raw ? String(opt2Raw).trim() : "";
                let opt3 = opt3Raw ? String(opt3Raw).trim() : "";
                
                // 🎯 終極解法：前端完全不比對，直接接收後端算好的絕對答案索引！
                let correctIdx = row['computedCorrectIndex'] !== undefined ? parseInt(row['computedCorrectIndex']) : 0;
                
                let clueRaw = getVal(row, ['解釋', '提示']);
                let clue = clueRaw ? String(clueRaw).trim() : "請找出這個語詞";
                
                let questionRaw = getVal(row, ['測驗題目', '題目', '問題']);
                let question = questionRaw ? String(questionRaw).trim() : `請問關於「${word}」的解釋何者最接近？`;

                // 如果選項完全空白，給予防呆預設值，避免畫面破圖
                if (!opt1) opt1 = (correctIdx === 0 ? clue : "錯誤的選項 A");
                if (!opt2) opt2 = (correctIdx === 1 ? clue : "錯誤的選項 B");
                if (!opt3) opt3 = (correctIdx === 2 ? clue : "錯誤的選項 C");

                processed.push({
                    unit: unitName,
                    word: word,
                    clue: clue,
                    origin: getVal(row, ['典故']) || "尚無典故資料。",
                    sentences: sentences,
                    quiz: {
                        question: question,
                        options: [opt1, opt2, opt3],
                        correctIndex: correctIdx
                    }
                });
            });
            return processed;
        }

        // --- 大廳選單邏輯 ---
        function renderLobby() {
            const btnContainer = document.getElementById('lesson-buttons');
            btnContainer.innerHTML = '';
            
            const uniqueUnits = [...new Set(allWordData.map(item => item.unit))];

            uniqueUnits.forEach((unit, index) => {
                const btn = document.createElement('button');
                btn.className = 'lesson-btn';
                const wordCount = allWordData.filter(w => w.unit === unit).length;
                
                const colors = ['var(--btn-blue)', 'var(--btn-purple)', 'var(--btn-green)', 'var(--btn-orange)'];
                const accentColor = colors[index % colors.length];

                // 如果有過關記錄，產生記錄區塊
                let recordHtml = '';
                if (lessonRecords[unit]) {
                    recordHtml = `
                        <div class="mt-2 pt-2 border-t-2 flex gap-4 text-sm font-bold opacity-90 w-full justify-center" style="border-color: ${accentColor}40;">
                            <span style="color: #D35400;"><i class="fas fa-star text-yellow-500"></i> ${lessonRecords[unit].score}</span>
                            <span style="color: #2980B9;"><i class="fas fa-clock"></i> ${formatTime(lessonRecords[unit].time)}</span>
                        </div>
                    `;
                }

                btn.innerHTML = `
                    <span style="color: ${accentColor}"><i class="fas fa-book"></i> ${unit}</span>
                    <span class="text-sm px-3 py-1 rounded-full border-2" style="border-color: ${accentColor}40; color: var(--text-light); background: white;">
                        包含 ${wordCount} 個語詞
                    </span>
                    ${recordHtml}
                `;
                btn.onclick = () => startGame(unit);
                btnContainer.appendChild(btn);
            });

            document.getElementById('lobby-container').style.display = 'flex';
            document.getElementById('game-container').style.display = 'none';
            
            const canvas = document.getElementById('fireworks');
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        }

        function returnToLobby() {
            stopTimer(); // 確保返回大廳時停止計時
            renderLobby();
        }

        function startGame(unitName) {
            currentLessonName = unitName;
            currentLessonData = allWordData.filter(item => item.unit === unitName);
            document.getElementById('game-title').innerText = unitName;
            document.getElementById('lobby-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex'; 
            initGame();
        }

        // 計時器邏輯
        function startTimer() {
            clearInterval(timerInterval);
            timeElapsed = 0;
            document.getElementById('time-display').innerText = "00:00";
            timerInterval = setInterval(() => {
                timeElapsed++;
                document.getElementById('time-display').innerText = formatTime(timeElapsed);
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function formatTime(secs) {
            let m = String(Math.floor(secs / 60)).padStart(2, '0');
            let s = String(secs % 60).padStart(2, '0');
            return `${m}:${s}`;
        }

        // 高度同步邏輯 (讓右側版面與左側網格等高)
        function syncPanelHeight() {
            const gridEl = document.getElementById('grid-container');
            const rightPanel = document.getElementById('right-panel');
            if (window.innerWidth >= 768) { // 僅在電腦版並排時同步高度
                const gridHeight = gridEl.offsetHeight;

                rightPanel.style.maxHeight = 'none'; // 手機版解除限制
            }

        // --- 遊戲核心引擎 ---
        function initGame() {
            const maxWordLen = Math.max(...currentLessonData.map(w => w.word.length));
            // 自動計算網格大小，稍微比最長字長度多一點，並考量總詞數
            GRID_SIZE = Math.max(8, Math.min(12, Math.ceil(maxWordLen * 1.3) + Math.floor(currentLessonData.length / 4)));
            
            const allChars = currentLessonData.map(w => w.word).join('');
            const uniqueChars = [...new Set(allChars.split(''))];
            const extraChars = "的是了我不人在他有這一個上們來到時大地為子中你說生國年那就和要她出也得裡後自以會家可下而過天去能對小多然於心學麼起都把好太水作";
            const fillerChars = uniqueChars.join('') + extraChars;

            grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(''));
            placedWordsInfo = [];
            foundWords = [];
            perfectWords = [];
            quizStatus = {}; // 重置測驗狀態
            failedWords = []; // 重置答錯清單
            essayGenerationCount = 0; 
            isEndGameTriggered = false; // 重置結算鎖
            score = 0;
            colorIndex = 0; 
            
            // 隱藏短文挑戰按鈕
            document.getElementById('essay-btn-container').classList.add('hidden');
            
            let wordsToPlace = [...currentLessonData].sort(() => 0.5 - Math.random());
            wordsToPlace.forEach(item => placeWord(item.word));
            
            // 填滿剩餘空格
            for(let r=0; r<GRID_SIZE; r++) {
                for(let c=0; c<GRID_SIZE; c++) {
                    if(grid[r][c] === '') {
                        grid[r][c] = fillerChars.charAt(Math.floor(Math.random() * fillerChars.length));
                    }
                }
            }
            
            renderBoard();
            renderWordList();
            setupInteractions();
            
            // 延遲一下等待 DOM 渲染完成後同步高度
            setTimeout(syncPanelHeight, 50);

            document.getElementById('total-count').innerText = currentLessonData.length;
            document.getElementById('found-count').innerText = "0";
            document.getElementById('score-display').innerText = "0";
            
            startTimer(); // 開始計時
        }

        function placeWord(word) {
            // 只允許橫向、直向、正斜向
            const dirs = [ {dr:0, dc:1}, {dr:1, dc:0}, {dr:1, dc:1} ];
            for(let attempt=0; attempt<100; attempt++) {
                const dir = dirs[Math.floor(Math.random() * dirs.length)];
                const r = Math.floor(Math.random() * GRID_SIZE);
                const c = Math.floor(Math.random() * GRID_SIZE);
                
                if (canPlace(word, r, c, dir.dr, dir.dc)) {
                    for(let i=0; i<word.length; i++) {
                        grid[r + i*dir.dr][c + i*dir.dc] = word[i];
                    }
                    placedWordsInfo.push({
                        word: word,
                        start: {r, c},
                        end: {r: r + (word.length-1)*dir.dr, c: c + (word.length-1)*dir.dc}
                    });
                    return;
                }
            }
        }

        function canPlace(word, r, c, dr, dc) {
            for(let i=0; i<word.length; i++) {
                const nr = r + i*dr;
                const nc = c + i*dc;
                if(nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) return false;
                if(grid[nr][nc] !== '' && grid[nr][nc] !== word[i]) return false;
            }
            return true;
        }

        function renderBoard() {
            const board = document.getElementById('grid-container');
            board.innerHTML = ''; // 清空，稍後會由 setupInteractions 動態加入預覽線
            board.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
            
            for(let r=0; r<GRID_SIZE; r++) {
                for(let c=0; c<GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = grid[r][c];
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    board.appendChild(cell);
                }
            }
        }

        function renderWordList() {
            const list = document.getElementById('word-list-container');
            list.innerHTML = '';
            
            const sortedData = [...currentLessonData].sort((a, b) => a.word.length - b.word.length);

            sortedData.forEach(item => {
                const tag = document.createElement('div');
                tag.className = 'word-tag';
                tag.id = `word-${item.word}`;
                
                // 如果已經找到，恢復之前的狀態包含皇冠
                if (foundWords.includes(item.word)) {
                    tag.classList.add('found');
                    let crownHtml = perfectWords.includes(item.word) ? '<i class="fas fa-crown crown-icon"></i>' : '';
                    tag.innerHTML = `<span>${item.word}</span> ${crownHtml}`;
                    // 恢復專屬顏色 (需從紀錄的 cell 取顏色或重新推算，最簡單是直接套用行內樣式，這邊簡化處理)
                } else {
                    tag.innerHTML = `<span>${item.word}</span>`;
                }
                
                tag.onclick = () => {
                    if(foundWords.includes(item.word)) openModal(item.word);
                };
                list.appendChild(tag);
            });
        }

        // --- 點擊兩點連線互動邏輯 ---
        function setupInteractions() {
            const board = document.getElementById('grid-container');
            
            // 移除舊的 listeners (透過 clone)
            const newBoard = board.cloneNode(true);
            board.parentNode.replaceChild(newBoard, board);
            
            // 建立預覽線元素
            previewLine = document.createElement('div');
            previewLine.className = 'preview-line';
            previewLine.style.display = 'none';
            newBoard.appendChild(previewLine);

            startCell = null;

            newBoard.addEventListener('click', handleBoardClick);
            // 電腦版滑鼠預覽
            newBoard.addEventListener('mousemove', handleHoverPreview);
            
            // 行動裝置：當點下第一點後，阻止預設捲動行為，方便點第二點
            newBoard.addEventListener('touchmove', (e) => {
                if (startCell) e.preventDefault();
            }, {passive: false});
            
            // 註：網格外部點擊的監聽器已移至全域頂層，避免重疊 Bug
        }

        function handleBoardClick(e) {
            // 防呆：如果是文字節點則抓取父元素
            const target = e.target.nodeType === 3 ? e.target.parentNode : e.target;
            const cell = target.closest('.cell');
            
            // 讓已經過關的文字方塊也能成為新語詞的起點或終點 (開放共用字磚)
            if (!cell) return;

            const r = parseInt(cell.dataset.r);
            const c = parseInt(cell.dataset.c);

            if (!startCell) {
                // 第一點：記錄起點並加上 selected 樣式
                startCell = cell;
                cell.classList.add('selected');
                updatePreviewLine(cell, cell); // 起始線長度為 0
            } else {
                // 第二點：驗證連線
                if (startCell === cell) {
                    clearSelection(); // 點同一個字取消
                    return;
                }
                
                const startR = parseInt(startCell.dataset.r);
                const startC = parseInt(startCell.dataset.c);
                
                // 檢查是否在直線上 (橫、直、斜)
                const dr = r - startR;
                const dc = c - startC;
                if (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) {
                    checkConnection(startR, startC, r, c);
                } else {
                    // 不在直線上，視為重新選第一點
                    clearSelection();
                    startCell = cell;
                    cell.classList.add('selected');
                    updatePreviewLine(cell, cell);
                }
            }
        }

        function handleHoverPreview(e) {
            if (!startCell) return;
            const target = e.target.nodeType === 3 ? e.target.parentNode : e.target;
            const currentCell = target.closest('.cell');
            
            clearPathPreview();

            if (!currentCell) {
                if (previewLine) previewLine.style.display = 'none';
                return;
            }

            const startR = parseInt(startCell.dataset.r);
            const startC = parseInt(startCell.dataset.c);
            const currR = parseInt(currentCell.dataset.r);
            const currC = parseInt(currentCell.dataset.c);

            // 只有在有效連線方向上才顯示預覽線
            const dr = currR - startR;
            const dc = currC - startC;
            if (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) {
                updatePreviewLine(startCell, currentCell);
                
                // === 新增：路徑格子凸起特效 ===
                const stepR = Math.sign(dr);
                const stepC = Math.sign(dc);
                const steps = Math.max(Math.abs(dr), Math.abs(dc));
                
                for (let i = 0; i <= steps; i++) {
                    let r = startR + i * stepR;
                    let c = startC + i * stepC;
                    let cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
                    if (cell && cell !== startCell) {
                        cell.classList.add('path-preview');
                    }
                }
                // === 結束新增 ===
            } else {
                if (previewLine) previewLine.style.display = 'none';
            }
        }

        function clearPathPreview() {
            document.querySelectorAll('.cell.path-preview').forEach(cell => cell.classList.remove('path-preview'));
        }

        function updatePreviewLine(cellA, cellB) {
            if (!previewLine) return;
            
            const boardBox = document.getElementById('grid-container').getBoundingClientRect();
            const boxA = cellA.getBoundingClientRect();
            const boxB = cellB.getBoundingClientRect();

            // 計算中心點相對於 board 的位置
            const x1 = boxA.left + boxA.width/2 - boardBox.left;
            const y1 = boxA.top + boxA.height/2 - boardBox.top;
            const x2 = boxB.left + boxB.width/2 - boardBox.left;
            const y2 = boxB.top + boxB.height/2 - boardBox.top;

            const distance = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;

            // 預覽線寬度跟 cell 高度差不多
            previewLine.style.height = `${boxA.height * 0.8}px`; 
            previewLine.style.width = `${distance + boxA.width * 0.8}px`; // 加上一點寬度包覆兩端的字
            
            // 定位在起點中心點，並向左上方偏移線寬的一半
            previewLine.style.left = `${x1 - (boxA.width * 0.4)}px`;
            previewLine.style.top = `${y1 - (boxA.height * 0.4)}px`;
            
            previewLine.style.transform = `rotate(${angle}deg)`;
            previewLine.style.display = 'block';
        }

        function clearSelection() {
            if (startCell) startCell.classList.remove('selected');
            startCell = null;
            if (previewLine) previewLine.style.display = 'none';
            clearPathPreview();
        }

        function checkConnection(r1, c1, r2, c2) {
            const dr = Math.sign(r2 - r1);
            const dc = Math.sign(c2 - c1);
            const steps = Math.max(Math.abs(r2 - r1), Math.abs(c2 - c1));
            
            let selectedWord = "";
            let cellsToMark = [];

            for (let i = 0; i <= steps; i++) {
                let r = r1 + i * dr;
                let c = c1 + i * dc;
                selectedWord += grid[r][c];
                cellsToMark.push(document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`));
            }

            const reversedWord = selectedWord.split('').reverse().join('');
            
            let matchedWord = null;
            if (currentLessonData.some(w => w.word === selectedWord)) matchedWord = selectedWord;
            else if (currentLessonData.some(w => w.word === reversedWord)) matchedWord = reversedWord;

            if (matchedWord && !foundWords.includes(matchedWord)) {
                // 答對了！
                foundWords.push(matchedWord);
                
                const color = earthTonePalette[colorIndex % earthTonePalette.length];
                colorIndex++;
                
                cellsToMark.forEach(cell => {
                    if(cell) {
                        cell.classList.remove('selected');
                        cell.classList.add('found');
                        
                        // 👉 追蹤該字磚擁有的顏色
                        if (!cell._foundColors) cell._foundColors = [];
                        if (!cell._foundColors.includes(color.bg)) {
                            cell._foundColors.push(color.bg);
                        }

                        // 👉 若有多個顏色，則渲染為漸層
                        if (cell._foundColors.length === 1) {
                            cell.style.setProperty('background', cell._foundColors[0], 'important');
                        } else {
                            const gradient = `linear-gradient(135deg, ${cell._foundColors.join(', ')})`;
                            cell.style.setProperty('background', gradient, 'important');
                        }
                        
                        cell.style.setProperty('border-color', color.border, 'important');
                        cell.style.setProperty('color', color.text, 'important');
                    }
                });
                
                const tag = document.getElementById(`word-${matchedWord}`);
                if (tag) {
                    tag.classList.add('found');
                    // 保留皇冠如果它已經在那裡 (理論上此時還沒出題所以沒有皇冠，但保險起見)
                    let existingCrown = tag.querySelector('.crown-icon') ? '<i class="fas fa-crown crown-icon"></i>' : '';
                    tag.innerHTML = `<span>${matchedWord}</span> ${existingCrown}`;
                    tag.style.setProperty('background-color', color.bg, 'important');
                    tag.style.setProperty('border-color', color.border, 'important');
                    tag.style.setProperty('color', color.text, 'important');
                    tag.style.setProperty('box-shadow', `0 4px 0 ${color.border}`, 'important');
                }
                
                score += matchedWord.length * 50;
                document.getElementById('score-display').innerText = score;
                document.getElementById('found-count').innerText = foundWords.length;
                
                setTimeout(() => openModal(matchedWord), 400);

                // 只做計時與計分，短文觸發改由 closeModal 統一管理
                if (foundWords.length === currentLessonData.length) {
                    stopTimer(); // 停止計時
                    if (!lessonRecords[currentLessonName] || score > lessonRecords[currentLessonName].score) {
                        lessonRecords[currentLessonName] = { score: score, time: timeElapsed };
                    }
                }
            } else {
                // 答錯視覺回饋 (可選)
            }
            
            clearSelection();
        }

        // --- 學習 Modal 互動邏輯 ---
        function openModal(word) {
            currentModalWord = word;
            currentSentenceIdx = 0; // 每次打開 Modal 重置造句輪播順序
            const target = currentLessonData.find(w => w.word === word);
            
            document.getElementById('modal-word').innerText = word;
            document.getElementById('modal-meaning').innerHTML = target.clue.replace(/\n/g, '<br>');
            
            // 確保每次打開時解釋區塊都是顯示的
            document.querySelector('.meaning-box').style.display = 'block';
            
            document.getElementById('learning-modal').classList.add('show');
            showContent('none'); 
            
            // 重置按鈕狀態：造句永遠可以點
            document.getElementById('btn-ai-sentence').disabled = false;
            document.getElementById('btn-ai-sentence').innerHTML = '<i class="fas fa-pencil-alt"></i> 造句';
            
            // 測驗按鈕依據實際作答狀態決定
            const btnQuiz = document.getElementById('btn-ai-quiz');
            if (quizStatus[word]) {
                btnQuiz.innerHTML = '<i class="fas fa-lock"></i> 測驗結束';
                btnQuiz.disabled = true;
            } else {
                btnQuiz.innerHTML = '<i class="fas fa-question-circle"></i> 測驗';
                btnQuiz.disabled = false;
            }
        }

        function closeModal() {
            document.getElementById('learning-modal').classList.remove('show');
            currentModalWord = null;

            // 👉 終極觸發判斷：所有語詞都找完，且所有測驗都答完，且還沒結算過，才在關閉視窗後進入結算
            if (foundWords.length === currentLessonData.length && Object.keys(quizStatus).length === currentLessonData.length && !isEndGameTriggered) {
                isEndGameTriggered = true; // 鎖定，避免重複觸發
                
                if (failedWords.length > 0) {
                    setTimeout(startFillInTheBlankTest, 500); // 延遲半秒開啟短文測驗，讓視覺平順
                } else {
                    setTimeout(showWinEffect, 500); // 全部答對，直接放煙火
                }
            }
        }

        async function showContent(type) {
            const target = currentLessonData.find(w => w.word === currentModalWord);
            if(!target) return;

            // 隱藏所有內容區塊
            document.querySelectorAll('.content-box').forEach(b => b.classList.remove('show'));
            
            // 處理「解釋區塊」的顯示與隱藏
            const meaningBox = document.querySelector('.meaning-box');
            if (type === 'quiz') {
                meaningBox.style.display = 'none';
            } else {
                meaningBox.style.display = 'block';
            }

            if(type === 'none') return;

            const btn = document.getElementById(`btn-ai-${type}`);
            const contentBox = document.getElementById('content-box');
            const quizBox = document.getElementById('quiz-box');
            
            // 設定 Modal 頂部飾條顏色
            const colorMap = {
                'sentence': 'var(--btn-blue)',
                'quiz': 'var(--btn-green)'
            };
            document.getElementById('modal-color-bar').style.background = colorMap[type];

            // 模擬思考
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> 思考中`;
            document.querySelectorAll('#modal-buttons button').forEach(b => b.disabled = true);
            
            await new Promise(resolve => setTimeout(resolve, 800));

            if (type === 'sentence') {
                // 依序選取造句
                const sentence = target.sentences[currentSentenceIdx];
                contentBox.className = 'content-box box-sentence show';
                contentBox.innerHTML = `
                    <div class="font-bold mb-2 opacity-80"><i class="fas fa-quote-left"></i> 例句參考：</div>
                    <div class="text-lg font-bold">${sentence}</div>
                `;
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> 下一句';
                
                // 更新索引，如果超過總句數就回到第 0 句
                currentSentenceIdx = (currentSentenceIdx + 1) % target.sentences.length;
            } 
            else if (type === 'quiz') {
                quizBox.classList.add('show');
                document.getElementById('quiz-question').innerText = target.quiz.question;
                const optsContainer = document.getElementById('quiz-options');
                optsContainer.innerHTML = '';
                
                // 處理選項打亂與渲染
                let optionsWithIndex = target.quiz.options.map((opt, i) => ({ text: opt, originalIndex: i }));
                
                // 如果這題還沒作答過，就把選項洗牌
                if (!quizStatus[currentModalWord]) {
                    for (let i = optionsWithIndex.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [optionsWithIndex[i], optionsWithIndex[j]] = [optionsWithIndex[j], optionsWithIndex[i]];
                    }
                    // 將洗好的順序暫存起來，避免關掉再開順序變來變去
                    target.quiz.shuffledOptions = optionsWithIndex;
                } else {
                    optionsWithIndex = target.quiz.shuffledOptions || optionsWithIndex;
                }

                optionsWithIndex.forEach((optObj) => {
                    const div = document.createElement('div');
                    div.className = 'quiz-option';
                    div.innerText = optObj.text;
                    
                    // 如果這題已經作答過，直接呈現結果，並鎖死點擊
                    if (quizStatus[currentModalWord]) {
                        div.style.pointerEvents = 'none';
                        if (optObj.originalIndex === target.quiz.correctIndex) {
                            div.classList.add('correct');
                            div.innerHTML += ' <i class="fas fa-check float-right mt-1"></i>';
                        } else if (quizStatus[currentModalWord] === 'wrong' && optObj.wasSelected) {
                            // 標示出之前選錯的那個
                            div.classList.add('wrong');
                            div.innerHTML += ' <i class="fas fa-times float-right mt-1"></i>';
                        }
                    } else {
                        // 尚未作答，綁定點擊事件
                        div.onclick = function() {
                            const allOpts = document.querySelectorAll('.quiz-option');
                            allOpts.forEach(o => o.style.pointerEvents = 'none'); 
                            
                            if (optObj.originalIndex === target.quiz.correctIndex) {
                                // 答對了
                                quizStatus[currentModalWord] = 'correct';
                                this.classList.add('correct');
                                this.innerHTML += ' <span class="plus-50">+50分!</span> <i class="fas fa-check float-right mt-1"></i>';
                                score += 50;
                                document.getElementById('score-display').innerText = score;
                                
                                if (!perfectWords.includes(currentModalWord)) {
                                    perfectWords.push(currentModalWord);
                                }
                                const wordTag = document.getElementById(`word-${currentModalWord}`);
                                if (wordTag && !wordTag.querySelector('.crown-icon')) {
                                    wordTag.innerHTML += '<i class="fas fa-crown crown-icon"></i>';
                                }
                            } else {
                                // 答錯了
                                quizStatus[currentModalWord] = 'wrong';
                                optObj.wasSelected = true; // 記錄他選錯這項
                                if (!failedWords.includes(currentModalWord)) {
                                    failedWords.push(currentModalWord);
                                }
                                this.classList.add('wrong');
                                this.innerHTML += ' <i class="fas fa-times float-right mt-1"></i>';
                                
                                // 把正確答案標出來
                                const correctDiv = Array.from(allOpts).find(el => el.innerText.includes(target.quiz.options[target.quiz.correctIndex]));
                                if(correctDiv) correctDiv.classList.add('correct');
                            }
                            
                            // 答題後立刻鎖定測驗按鈕
                            const quizBtn = document.getElementById('btn-ai-quiz');
                            quizBtn.innerHTML = '<i class="fas fa-lock"></i> 測驗結束';
                            quizBtn.disabled = true;
                            
                            // 顯示短文測驗按鈕 (以防玩家自己想提早挑戰)
                            if (Object.keys(quizStatus).length === currentLessonData.length) {
                                document.getElementById('essay-btn-container').classList.remove('hidden');
                            }
                        };
                    }
                    optsContainer.appendChild(div);
                });
            }

            // --- 統一恢復與管理按鈕狀態 ---
            const btnSentence = document.getElementById('btn-ai-sentence');
            const btnQuiz = document.getElementById('btn-ai-quiz');

            // 造句按鈕永遠可以點選
            btnSentence.disabled = false;
            if (type === 'sentence') {
                btnSentence.innerHTML = '<i class="fas fa-sync-alt"></i> 下一句';
            } else {
                btnSentence.innerHTML = '<i class="fas fa-pencil-alt"></i> 造句';
            }

            // 測驗按鈕：若已作答則鎖定，否則保持開放讓學生可以隨時切換回來
            if (quizStatus[currentModalWord]) {
                btnQuiz.innerHTML = '<i class="fas fa-lock"></i> 測驗結束';
                btnQuiz.disabled = true;
            } else {
                btnQuiz.innerHTML = '<i class="fas fa-question-circle"></i> 測驗';
                btnQuiz.disabled = false;
            }
        }

        // --- AI 填空測驗挑戰 ---
        async function startFillInTheBlankTest() {
            const modal = document.getElementById('fill-blank-modal');
            const loadingBox = document.getElementById('fb-loading');
            const contentBox = document.getElementById('fb-content');
            
            // 每次打開時重置載入畫面
            loadingBox.innerHTML = `
                <i class="fas fa-pen-fancy text-4xl mb-4 text-purple-400 animate-pulse"></i>
                <p class="text-lg font-bold text-gray-600">AI 老師正在為你量身打造專屬短文<span class="loading-dots"></span></p>
            `;
            
            modal.classList.add('show');
            loadingBox.classList.remove('hidden');
            contentBox.classList.add('hidden');
            contentBox.classList.remove('flex');
            
            selectedTouchWord = null; // 重置觸控狀態
            
            // 👉 處理 5-7 個語詞的挑選邏輯
            essayGenerationCount++;
            let targetCount = Math.floor(Math.random() * 3) + 5; // 隨機 5, 6, 或 7 個
            targetCount = Math.min(targetCount, currentLessonData.length); // 確保不超過總題數
            
            let wordsToUse = [];
            const allWords = currentLessonData.map(w => w.word);

            if (essayGenerationCount === 1) {
                // 第一次生成：優先挑選測驗答錯的語詞
                let shuffledFailed = [...failedWords].sort(() => 0.5 - Math.random());
                wordsToUse = shuffledFailed.slice(0, targetCount);
                
                // 如果錯題不夠，從其他語詞中隨機補齊
                if (wordsToUse.length < targetCount) {
                    let remainingWords = allWords.filter(w => !wordsToUse.includes(w)).sort(() => 0.5 - Math.random());
                    let padCount = targetCount - wordsToUse.length;
                    wordsToUse = wordsToUse.concat(remainingWords.slice(0, padCount));
                }
            } else {
                // 第二次以後：純隨機挑選
                wordsToUse = [...allWords].sort(() => 0.5 - Math.random()).slice(0, targetCount);
            }

            // 設計給 AI 的 prompt，嚴格要求字數與標記格式
            const wordsList = wordsToUse.join('、');
            const prompt = `請創作一篇約 250 到 350 字的短文，內容設定為適合國小高年級學生的日常校園生活、溫馨家庭或有趣小探險。
            請務必在文章中，自然且通順地使用以下語詞：${wordsList}。
            【重要格式規定】：
            請將上述指定的語詞，用大括號標記起來。例如：這是一件{冥冥之中}注定的事。
            除了這些指定的語詞外，文章的任何其他地方絕對不能使用大括號。`;

            try {
                let aiText = await callGeminiAPI(prompt);
                
                // 解析 AI 回傳的文字，建立填空區
                const articleContainer = document.getElementById('article-container');
                const bankContainer = document.getElementById('word-bank-container');
                articleContainer.innerHTML = '';
                bankContainer.innerHTML = '';

                // 使用 Regex 分割文字與 {語詞}
                const parts = aiText.split(/\{(.*?)\}/g);
                let dropzoneHtml = '';
                let wordsToBank = [];

                parts.forEach((part, index) => {
                    if (index % 2 === 0) {
                        // 純文字部分
                        dropzoneHtml += part.replace(/\n/g, '<br>');
                    } else {
                        // 目標語詞部分
                        let cleanWord = part.trim();
                        // 防呆：確保提取出的詞確實是我們要求的，或至少有長度
                        if (cleanWord) {
                            dropzoneHtml += `<span class="dropzone" data-answer="${cleanWord}"></span>`;
                            wordsToBank.push(cleanWord);
                        }
                    }
                });

                articleContainer.innerHTML = dropzoneHtml;

                // 打亂備選區的語詞
                wordsToBank.sort(() => Math.random() - 0.5);
                wordsToBank.forEach((w, i) => {
                    const wDiv = document.createElement('div');
                    wDiv.className = 'drag-word';
                    wDiv.innerText = w;
                    wDiv.draggable = true;
                    wDiv.id = 'drag-word-' + i;
                    
                    // 綁定拖曳事件
                    wDiv.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('text/plain', w);
                        e.dataTransfer.setData('source-id', wDiv.id);
                    });

                    // 綁定點擊事件 (支援觸控或滑鼠直接點)
                    wDiv.addEventListener('click', () => {
                        document.querySelectorAll('.drag-word').forEach(el => el.classList.remove('selected-for-touch'));
                        wDiv.classList.add('selected-for-touch');
                        selectedTouchWord = { word: w, id: wDiv.id, el: wDiv };
                    });

                    bankContainer.appendChild(wDiv);
                });

                // 綁定空格的事件
                document.querySelectorAll('.dropzone').forEach(zone => {
                    // 拖放事件
                    zone.addEventListener('dragover', e => {
                        e.preventDefault();
                        if (!zone.classList.contains('correct')) zone.classList.add('active-target');
                    });
                    zone.addEventListener('dragleave', () => zone.classList.remove('active-target'));
                    zone.addEventListener('drop', e => {
                        e.preventDefault();
                        zone.classList.remove('active-target');
                        if (zone.classList.contains('correct')) return;

                        const draggedWord = e.dataTransfer.getData('text/plain');
                        const sourceId = e.dataTransfer.getData('source-id');
                        checkDropAnswer(zone, draggedWord, document.getElementById(sourceId));
                    });

                    // 點擊事件 (配合上方點選語詞)
                    zone.addEventListener('click', () => {
                        if (zone.classList.contains('correct') || !selectedTouchWord) return;
                        checkDropAnswer(zone, selectedTouchWord.word, selectedTouchWord.el);
                        document.querySelectorAll('.drag-word').forEach(el => el.classList.remove('selected-for-touch'));
                        selectedTouchWord = null;
                    });
                });

                loadingBox.classList.add('hidden');
                contentBox.classList.add('flex');
                contentBox.classList.remove('hidden');

            } catch (err) {
                console.error("AI 填空生成失敗", err);
                // 發生錯誤時不再默默關閉，而是顯示錯誤按鈕，讓遊戲能夠順利結算
                loadingBox.innerHTML = `
                    <i class="fas fa-exclamation-triangle text-4xl mb-4 text-red-400"></i>
                    <p class="text-lg font-bold text-red-600 mb-2">AI 連線失敗，請檢查 API 金鑰或網路環境</p>
                    <p class="text-sm text-gray-500 mb-4">(若在電腦本機測試，請先解除網址限制或上傳至 GitHub 測試)</p>
                    <button onclick="document.getElementById('fill-blank-modal').classList.remove('show'); showWinEffect();" class="btn btn-quiz">跳過測驗，直接結算</button>
                `;
            }
        }

        function checkDropAnswer(zone, word, sourceEl) {
            const correctAnswer = zone.dataset.answer;
            if (word === correctAnswer) {
                // 答對了
                zone.innerText = word;
                zone.classList.add('correct');
                zone.classList.remove('wrong');
                if (sourceEl) sourceEl.classList.add('used');
                
                // 檢查是否全部填完
                const totalZones = document.querySelectorAll('.dropzone').length;
                const correctZones = document.querySelectorAll('.dropzone.correct').length;
                if (totalZones === correctZones) {
                    setTimeout(() => {
                        document.getElementById('fill-blank-modal').classList.remove('show');
                        showWinEffect();
                    }, 1000);
                }
            } else {
                // 答錯了
                zone.innerText = word;
                zone.classList.add('wrong');
                setTimeout(() => {
                    if (!zone.classList.contains('correct')) {
                        zone.innerText = '';
                        zone.classList.remove('wrong');
                    }
                }, 800);
            }
        }

        function showWinEffect() {
            const canvas = document.getElementById('fireworks');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const particles = [];
            // 使用莫蘭迪色系的煙火
            const colors = ['#A8B8C2', '#C2B8CC', '#B5C4B1', '#D4BBA5', '#D8D2CB'];

            function createExplosion(x, y) {
                for (let i = 0; i < 60; i++) {
                    particles.push({
                        x: x, y: y,
                        vx: (Math.random() - 0.5) * 12,
                        vy: (Math.random() - 0.5) * 12,
                        life: 1,
                        color: colors[Math.floor(Math.random() * colors.length)]
                    });
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx; p.y += p.vy;
                    p.vy += 0.15; // 重力
                    p.life -= 0.02;
                    
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                    
                    if (p.life <= 0) particles.splice(i, 1);
                }
                
                if (particles.length > 0) requestAnimationFrame(animate);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            createExplosion(canvas.width/2, canvas.height/3);
            setTimeout(() => createExplosion(canvas.width/3, canvas.height/2), 300);
            setTimeout(() => createExplosion(canvas.width*2/3, canvas.height/2), 600);
            
            animate();
            
            // 延遲顯示自訂的結算 Modal (取代原本的 alert)
            setTimeout(() => {
                showGameOverModal(score);
            }, 1500);
        }

        function showGameOverModal(finalScore) {
            document.getElementById('final-score-display').innerText = finalScore;
            document.getElementById('game-over-modal').classList.add('show');
        }

        function closeGameOverModalAndReturn() {
            document.getElementById('game-over-modal').classList.remove('show');
            returnToLobby();
        }

    </script>
</body>
</html>
