<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國語找字遊戲 v2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap');

        /* 莫蘭迪色系變數設定 */
        :root {
            --bg-base: #F4F1ED;
            --bg-pattern: #EBE6DF;
            
            --text-main: #696561;
            --text-light: #9B9895;
            
            --panel-bg: #FFFFFF;
            --panel-border: #D8D2CB;
            
            --grid-border: #BDB5AD;
            --cell-bg: #FCFBF9;
            --cell-border: #E8E4DF;
            --cell-hover: #F0EBE5;
            
            --cell-selected-bg: #C1C9C8;
            --cell-selected-border: #9BA6A5;
            --cell-selected-text: #4A5554;
            
            --cell-found-bg: #D4A373;
            --cell-found-border: #BC8A59;
            --cell-found-text: #FFFFFF;

            --btn-blue: #A8B8C2;
            --btn-blue-hover: #8A9CA8;
            --btn-purple: #C2B8CC;
            --btn-purple-hover: #A69AB2;
            --btn-green: #B5C4B1;
            --btn-green-hover: #98A994;
            --btn-orange: #D4BBA5;
            --btn-orange-hover: #BCA089;
            
            --lobby-btn-bg: #F8F6F4;
            --lobby-btn-border: #D4CFC9;
            --lobby-btn-hover: #E2DDD6;
        }

        body {
            font-family: 'Zen Maru Gothic', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(var(--bg-pattern) 20%, transparent 20%), 
                radial-gradient(var(--bg-pattern) 20%, transparent 20%);
            background-position: 0 0, 40px 40px;
            background-size: 80px 80px;
            overflow-x: hidden;
            touch-action: manipulation;
            user-select: none;
            color: var(--text-main);
        }

        .footer-version {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 0.85rem;
            color: var(--text-light);
            z-index: 9999;
            pointer-events: none;
            font-weight: bold;
        }

        #lobby-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .lobby-panel {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(105, 101, 97, 0.08);
            max-width: 800px;
            width: 100%;
            text-align: center;
            border-top: 8px solid var(--grid-border);
        }

        .lesson-btn {
            background: var(--lobby-btn-bg);
            color: var(--text-main);
            border: 3px solid var(--lobby-btn-border);
            border-radius: 20px;
            padding: 20px;
            font-size: 1.25rem;
            font-weight: bold;
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 0 var(--lobby-btn-border);
        }

        .lesson-btn:hover { background: var(--lobby-btn-hover); transform: translateY(-2px); box-shadow: 0 8px 0 var(--lobby-btn-border); }
        .lesson-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--lobby-btn-border); }

        #game-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            min-height: 100vh;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header-panel {
            background: var(--panel-bg);
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 6px 0 var(--panel-border);
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 25px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .back-btn {
            background: var(--bg-base);
            color: var(--text-main);
            border: 2px solid var(--panel-border);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover { background: var(--lobby-btn-hover); }

        .word-search-grid {
            display: grid;
            gap: 6px;
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(105, 101, 97, 0.08);
            border: 8px solid var(--grid-border);
            position: relative;
            touch-action: none;
            margin-bottom: 20px;
            z-index: 1;
        }

        .cell {
            width: clamp(35px, 8vmin, 50px);
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--cell-bg);
            border-radius: 12px;
            font-weight: bold;
            font-size: clamp(18px, 4vmin, 24px);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.15s ease;
            border: 2px solid var(--cell-border);
            box-shadow: 0 3px 0 var(--panel-border);
            z-index: 2;
        }

        .cell:hover:not(.found):not(.selected) { background-color: var(--cell-hover); transform: translateY(-2px); }

        .cell.selected {
            background-color: var(--cell-selected-bg);
            border-color: var(--cell-selected-border);
            color: var(--cell-selected-text);
            transform: scale(1.1) !important; 
            box-shadow: 0 4px 0 var(--cell-selected-border) !important;
            filter: brightness(0.95);
            z-index: 10;
        }

        .cell.path-preview { transform: scale(1.08) translateY(-2px); background-color: var(--cell-hover); border-color: var(--cell-selected-border); z-index: 8; box-shadow: 0 4px 0 var(--panel-border); }
        .cell.found { background-color: var(--cell-found-bg) !important; border-color: var(--cell-found-border) !important; color: var(--cell-found-text) !important; box-shadow: none !important; animation: pop 0.4s ease; }

        .preview-line { position: absolute; background-color: var(--cell-selected-bg); opacity: 0.5; z-index: 1; border-radius: 20px; pointer-events: none; transform-origin: left center; }

        .word-list { display: flex; flex-wrap: wrap; gap: 12px; justify-content: flex-start; width: 100%; }
        
        .word-tag {
            background: var(--panel-bg); padding: 10px 18px; border-radius: 20px; font-size: 1rem; color: var(--text-light); border: 2px dashed var(--panel-border); transition: all 0.3s; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; position: relative;
        }

        .word-tag.found { background: var(--cell-found-bg); color: var(--cell-found-text); border: 2px solid var(--cell-found-border); box-shadow: 0 4px 0 var(--cell-found-border); opacity: 1; }
        .word-tag.found:active { transform: translateY(4px); box-shadow: none; }

        .crown-icon { position: absolute; top: -12px; right: -10px; color: #F4D03F; font-size: 1.3rem; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2)); transform: rotate(15deg); z-index: 10; }
        .plus-50 { display: inline-block; color: #2E7D32; font-weight: 900; margin-left: 8px; animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .list-panel-box { display: flex; flex-direction: column; overflow: hidden; }
        .word-list-scroll { overflow-y: auto; overflow-x: hidden; flex: 1; padding-top: 16px; padding-right: 16px; padding-left: 4px; padding-bottom: 10px; align-content: flex-start; }
        .word-list-scroll::-webkit-scrollbar { width: 6px; }
        .word-list-scroll::-webkit-scrollbar-track { background: var(--bg-base); border-radius: 10px; }
        .word-list-scroll::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 10px; }

        .btn { color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: all 0.15s; margin: 5px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:active:not(:disabled) { transform: translateY(4px); box-shadow: none !important; }
        .btn:disabled { background-color: var(--grid-border) !important; box-shadow: none !important; cursor: not-allowed; transform: none; opacity: 0.7; }

        .btn-sentence { background: var(--btn-blue); box-shadow: 0 4px 0 #8DA0AC; }
        .btn-sentence:hover { background: var(--btn-blue-hover); }
        .btn-origin { background: var(--btn-purple); box-shadow: 0 4px 0 #A89CB5; }
        .btn-origin:hover { background: var(--btn-purple-hover); }
        .btn-quiz { background: var(--btn-green); box-shadow: 0 4px 0 #9DB099; }
        .btn-quiz:hover { background: var(--btn-green-hover); }
        .btn-hint { background: var(--btn-orange); box-shadow: 0 4px 0 #BAA28C; padding: 8px 16px; font-size: 0.95rem; }
        .btn-hint:hover { background: var(--btn-orange-hover); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(105, 101, 97, 0.6); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(5px); }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: var(--panel-bg); padding: 35px 25px 25px 25px; border-radius: 30px; text-align: center; max-width: 90%; width: 450px; border: 8px solid var(--grid-border); box-shadow: 0 20px 50px rgba(0,0,0,0.15); transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; display: flex; flex-direction: column; align-items: center; max-height: 90vh; overflow-y: auto; overflow-x: hidden;
        }
        .modal-overlay.show .modal-content { transform: scale(1); }

        .modal-header-bar { position: absolute; top: 0; left: 0; width: 100%; height: 12px; background: var(--btn-blue); }

        .meaning-box { background: var(--bg-base); padding: 15px; border-radius: 15px; margin: 10px 0; color: var(--text-main); text-align: left; font-size: 1.1rem; line-height: 1.6; border-left: 5px solid var(--panel-border); width: 100%; }

        .content-box { padding: 15px; border-radius: 15px; margin: 10px 0; text-align: left; font-size: 1rem; line-height: 1.6; width: 100%; display: none; }
        .content-box.show { display: block; animation: fadeIn 0.4s; }
        .box-sentence { background: #EDF1F4; border-left: 5px solid var(--btn-blue); color: #5B6B75; }
        .box-origin { background: #F4EFF5; border-left: 5px solid var(--btn-purple); color: #6D627A; }
        .box-quiz { background: #EEF3ED; border-left: 5px solid var(--btn-green); color: #586B54; }

        .quiz-option { background: white; border: 2px solid var(--panel-border); padding: 10px 12px; margin-top: 8px; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-weight: bold; }
        .quiz-option:hover { background: var(--bg-base); }
        .quiz-option.correct { background: var(--cell-found-bg); border-color: var(--cell-found-border); color: var(--cell-found-text); }
        .quiz-option.wrong { background: #E8D6D6; border-color: #CFA3A3; color: #8A5A5A; }

        #fill-blank-modal .modal-content { width: 1050px; max-width: 95%; padding: 40px 30px; background: #FAFAFA; }

        .article-box { background: white; padding: 25px; border-radius: 20px; text-align: left; font-size: 1.15rem; line-height: 2.2; color: var(--text-main); border: 2px dashed var(--panel-border); margin-bottom: 0; width: 100%; }

        .dropzone { display: inline-block; min-width: 80px; height: 36px; margin: 0 6px; border-bottom: 3px solid var(--btn-blue); background: #EDF1F4; vertical-align: middle; text-align: center; line-height: 36px; border-radius: 8px 8px 0 0; color: var(--btn-blue); font-weight: bold; transition: all 0.2s; cursor: pointer; }
        .dropzone.active-target { background: #D5E1E8; border-bottom-color: var(--btn-orange); }
        .dropzone.correct { background: var(--cell-found-bg); border-bottom-color: var(--cell-found-border); color: white; pointer-events: none; }
        .dropzone.wrong { background: #FCE8E8; border-bottom-color: #E74C3C; color: #C0392B; animation: shake 0.4s; }

        .word-bank { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%; min-height: 60px; padding: 15px; background: var(--bg-base); border-radius: 15px; }

        .drag-word { background: var(--panel-bg); border: 2px solid var(--btn-blue); color: var(--btn-blue); padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: grab; user-select: none; transition: all 0.2s; box-shadow: 0 4px 0 var(--btn-blue); }
        .drag-word:active { cursor: grabbing; transform: translateY(4px); box-shadow: none; }
        .drag-word.selected-for-touch { background: var(--btn-blue); color: white; transform: translateY(2px); box-shadow: 0 2px 0 var(--btn-blue-hover); }
        .drag-word.used { opacity: 0; pointer-events: none; display: none; } /* 加了 display none 讓用過的字消失更徹底 */

        #init-loader { position: fixed; inset: 0; background: var(--bg-base); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-main); }
        canvas#fireworks { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 90; }

        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
        @keyframes pop { 0% { transform: scale(0.9); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>
    <div class="footer-version">大榮老師製作 © 2026 | Version 2.2 (v2.2)</div>

    <div id="init-loader">
        <i class="fas fa-circle-notch fa-spin text-5xl mb-4" style="color: var(--btn-blue)"></i>
        <h2 class="text-2xl font-bold">正在準備教材...</h2>
        <p class="mt-2 opacity-70" id="loader-msg">讀取雲端題庫中</p>
    </div>

    <canvas id="fireworks"></canvas>

    <!-- 大廳畫面 -->
    <div id="lobby-container">
        <div class="lobby-panel">
            <div class="inline-block p-4 rounded-full bg-white mb-4 shadow-sm border-2 border-gray-100">
                <i class="fas fa-leaf text-5xl" style="color: var(--btn-green)"></i>
            </div>
            <h1 class="text-4xl font-black mb-2 tracking-wider">語詞探索遊戲</h1>
            <p class="font-bold opacity-60 mb-8">請選擇你要挑戰的單元</p>
            <div id="lesson-buttons" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <div id="game-container">
        <div class="header-panel flex justify-between">
            <div class="flex gap-2">
                <button onclick="returnToLobby()" class="back-btn">
                    <i class="fas fa-arrow-left"></i> <span class="hidden md:inline">返回選單</span>
                </button>
                <!-- 新增重玩按鈕 -->
                <button onclick="restartGame()" class="back-btn" style="color: var(--btn-green); border-color: var(--btn-green);">
                    <i class="fas fa-redo"></i> <span class="hidden md:inline">重玩一次</span>
                </button>
            </div>
            
            <h1 id="game-title" class="text-xl md:text-2xl font-bold tracking-wider m-0">單元名稱</h1>
            
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 font-bold text-lg px-4 py-1 rounded-full bg-white border-2" style="border-color: var(--panel-border);">
                    <i class="fas fa-clock" style="color: var(--btn-blue)"></i> 
                    <span id="time-display">00:00</span>
                </div>
                <div class="flex items-center gap-2 font-bold text-lg px-4 py-1 rounded-full bg-white border-2" style="border-color: var(--panel-border);">
                    <i class="fas fa-star" style="color: var(--btn-orange)"></i> 
                    <span id="score-display">0</span> 分
                </div>
            </div>
        </div>

        <div class="text-center mb-4">
            <p class="font-bold px-4 py-2 rounded-full inline-block bg-white border-2" style="border-color: var(--panel-border); color: var(--text-light);">
                <i class="fas fa-info-circle" style="color: var(--btn-blue)"></i> 玩法：點選語詞的「第一個字」，再點「最後一個字」即可連線
            </p>
        </div>

        <div class="flex flex-col md:flex-row gap-8 w-full justify-center items-stretch" id="main-content-area">
            <div class="flex flex-col items-center relative shrink-0">
                <div id="grid-container" class="word-search-grid"></div>
            </div>

            <div id="right-panel" class="list-panel-box bg-white p-6 rounded-3xl border-4" style="border-color: var(--panel-border); flex: 1; min-width: 300px;">
                <div class="flex justify-between items-end mb-4 border-b-2 pb-2 shrink-0" style="border-color: var(--bg-base);">
                    <h2 class="text-xl font-bold"><i class="fas fa-list-ul"></i> 尋找目標</h2>
                    <span class="text-sm font-bold px-3 py-1 rounded-full" style="background: var(--bg-base); color: var(--text-light);">
                        <span id="found-count">0</span> / <span id="total-count">0</span>
                    </span>
                </div>
                
                <div id="word-list-container" class="word-list word-list-scroll"></div>
                
                <div id="essay-btn-container" class="mt-4 flex justify-center hidden pb-2 shrink-0 border-t-2 pt-4" style="border-color: var(--bg-base);">
                    <button onclick="startFillInTheBlankTest()" class="btn btn-sentence text-lg px-8 py-3 w-full shadow-md" style="animation: bounceIn 0.8s;">
                        <i class="fas fa-scroll"></i> 短文測驗
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 學習互動 Modal -->
    <div id="learning-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header-bar" id="modal-color-bar"></div>
            <button onclick="closeModal()" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 transition text-gray-500"><i class="fas fa-times"></i></button>
            <h2 id="modal-word" class="text-3xl font-bold mb-1 mt-2 tracking-widest">語詞</h2>
            <div class="meaning-box"><p id="modal-meaning">這裡會顯示提示解釋...</p></div>
            <div id="content-box" class="content-box box-sentence"></div>
            <div id="quiz-box" class="content-box box-quiz">
                <p id="quiz-question" class="font-bold mb-3 text-lg"></p>
                <div id="quiz-options" class="flex flex-col"></div>
            </div>
            <div class="flex justify-center mt-4 w-full gap-2 border-t-2 pt-4" style="border-color: var(--bg-base);" id="modal-buttons">
                <button onclick="showContent('sentence')" id="btn-ai-sentence" class="btn btn-sentence flex-1"><i class="fas fa-pencil-alt"></i> 造句</button>
                <button onclick="showContent('quiz')" id="btn-ai-quiz" class="btn btn-quiz flex-1"><i class="fas fa-question-circle"></i> 測驗</button>
            </div>
        </div>
    </div>

    <!-- 短文測驗 Modal (優化版雙欄設計) -->
    <div id="fill-blank-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header-bar" style="background: var(--btn-blue)"></div>
            <button onclick="document.getElementById('fill-blank-modal').classList.remove('show')" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-gray-200 hover:bg-gray-300 transition text-gray-600 z-50">
                <i class="fas fa-times"></i>
            </button>
            
            <i class="fas fa-book-reader text-5xl mb-3 mt-2" style="color: var(--btn-blue)"></i>
            <h2 class="text-2xl font-bold mb-1">短文測驗</h2>
            <p class="text-gray-500 mb-4 font-bold text-sm">請將下方的語詞填入文章正確的空格中<br>(可拖曳，或先點語詞再點空格)</p>
            
            <div id="fb-loading" class="w-full text-center py-10 hidden">
                <i class="fas fa-pen-fancy text-4xl mb-4 text-purple-400 animate-pulse"></i>
                <p class="text-lg font-bold text-gray-600">AI 老師正在為你量身打造專屬短文<span class="loading-dots"></span></p>
            </div>

            <div id="fb-content" class="w-full hidden flex-col md:flex-row gap-6 items-start relative mt-4">
                <div id="article-container" class="article-box flex-1"></div>
                <div class="w-full md:w-[35%] sticky top-0 bg-white p-5 rounded-3xl border-4 shadow-sm shrink-0 flex flex-col z-10" style="border-color: var(--bg-base);">
                    <h3 class="text-xl font-bold mb-4 text-center border-b-2 pb-3" style="color: var(--text-main); border-color: var(--bg-base);">
                        <i class="fas fa-puzzle-piece" style="color: var(--btn-orange)"></i> 待填語詞
                    </h3>
                    <div id="word-bank-container" class="word-bank"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 結算 Modal -->
    <div id="game-over-modal" class="modal-overlay">
        <div class="modal-content overflow-hidden">
            <button onclick="document.getElementById('game-over-modal').classList.remove('show')" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 transition text-gray-500">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-header-bar" style="background: var(--btn-green)"></div>
            <i class="fas fa-trophy text-6xl mb-4 mt-6" style="color: #F1C40F"></i>
            <h2 class="text-3xl font-bold mb-4 text-gray-700">🎉 恭喜完成本單元！</h2>
            <div class="bg-gray-50 w-full rounded-2xl p-4 mb-2 border-2 border-gray-100">
                <p class="text-xl text-gray-600 mb-2 font-bold">您獲得了 <span id="final-score" class="text-3xl text-orange-500 mx-1">0</span> 分！</p>
                <p class="text-lg text-gray-500 font-bold"><i class="fas fa-stopwatch"></i> 完成時間：<span id="final-time" class="text-blue-500 ml-1">00:00</span></p>
            </div>
        </div>
    </div>

    <!-- 提示 Modal -->
    <div id="hint-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header-bar" style="background: var(--btn-orange)"></div>
            <i class="fas fa-lightbulb text-5xl mb-4 mt-4" style="color: var(--btn-orange)"></i>
            <h2 class="text-2xl font-bold mb-2">小提示</h2>
            <div class="meaning-box text-center" style="border-left-color: var(--btn-orange); background: #FAF5F0;"><p id="hint-content" class="font-medium text-lg">尋找中<span class="loading-dots"></span></p></div>
            <button onclick="document.getElementById('hint-modal').classList.remove('show')" class="btn w-full mt-2" style="background: var(--btn-orange); box-shadow: 0 4px 0 var(--btn-orange-hover);">我知道了</button>
        </div>
    </div>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbw3aOu9AJzVDdcmWBs9IPrnFClLD_UBnV4NgPlSW5h8PSLxAGkYUFcwnlLpaoYL4466/exec";
        
        async function callGeminiAPI(promptText) {
            const url = GAS_API_URL; 
            const delays = [1000, 2000, 3000];
            for (let i = 0; i <= delays.length; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ prompt: promptText })
                    });
                    if (!response.ok) throw new Error(`連線失敗 (HTTP ${response.status})`);
                    const data = await response.json();
                    if (data.error) throw new Error(data.error);
                    return data.text;
                } catch (error) {
                    if (i === delays.length) throw error;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }
        
        const fallbackData = [
            { unit: "第一課：寓言故事", word: "守株待兔", clue: "比喻拘泥守成，不知變通。", origin: "...", sentences: ["他整天守株待兔。"], quiz: { question: "「守株待兔」中，農夫最後得到了什麼？", options: ["有肉吃", "田地荒蕪", "學會打獵"], correctIndex: 1 } },
            { unit: "第一課：寓言故事", word: "狐假虎威", clue: "比喻藉著別人的威勢來欺壓人。", origin: "...", sentences: ["他仗著父親是經理狐假虎威。"], quiz: { question: "「狐假虎威」中，動物其實是怕誰？", options: ["狐狸", "老虎", "大象"], correctIndex: 1 } },
            { unit: "第二課：動物成語", word: "馬到成功", clue: "比喻事情順利，一開始就取得勝利。", origin: "...", sentences: ["祝你馬到成功！"], quiz: { question: "「馬到成功」適合用在？", options: ["祝賀順利", "跑得很快", "安慰失敗"], correctIndex: 0 } }
        ];

        let allWordData = []; 
        let currentLessonData = []; 
        let GRID_SIZE = 10;
        let grid = [];
        let placedWordsInfo = []; 
        let foundWords = [];
        let score = 0;
        
        let startCell = null;
        let previewLine = null;
        let currentModalWord = null;
        let currentSentenceIdx = 0;
        let colorIndex = 0; 

        let timerInterval = null;
        let timeElapsed = 0;
        let currentLessonName = "";
        let lessonRecords = {}; 
        let perfectWords = []; 
        
        let quizStatus = {}; 
        let failedWords = []; 
        let selectedTouchWord = null; 
        
        let essayGenerationCount = 0; 
        let isEndGameTriggered = false; 

        const earthTonePalette = [
            { bg: '#C28D75', border: '#A6725B', text: '#FFFFFF' }, { bg: '#7D9085', border: '#5C7064', text: '#FFFFFF' }, { bg: '#A67B8A', border: '#8A5D6D', text: '#FFFFFF' }, { bg: '#6B7A8C', border: '#4E5C6E', text: '#FFFFFF' }, { bg: '#D4A373', border: '#BC8A59', text: '#FFFFFF' }, { bg: '#918476', border: '#736557', text: '#FFFFFF' }, { bg: '#86A397', border: '#658277', text: '#FFFFFF' }, { bg: '#B58C73', border: '#966E56', text: '#FFFFFF' }, { bg: '#787586', border: '#5A5768', text: '#FFFFFF' }, { bg: '#8EA178', border: '#6E8159', text: '#FFFFFF' }
        ];

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.cell') && !e.target.classList.contains('preview-line') && !e.target.closest('.modal-content')) {
                clearSelection();
            }
        });

        window.onload = async function() {
            try {
                const response = await fetch(GAS_API_URL);
                if (!response.ok) throw new Error("網路連線異常");
                const data = await response.json();
                allWordData = processSheetData(data);
                if (allWordData.length === 0) throw new Error("題庫為空");
            } catch (err) {
                console.log("ℹ️ " + err.message + "，使用預設展示題庫。");
                allWordData = fallbackData;
            }
            await new Promise(resolve => setTimeout(resolve, 500));
            document.getElementById('init-loader').style.display = 'none';
            renderLobby();
        };

        function processSheetData(data) {
            let processed = [];
            const getVal = (row, possibleKeys) => {
                let bestMatch = undefined;
                for (let key in row) {
                    let cleanKey = String(key).replace(/[\s\(\)（）]+/g, '').toLowerCase(); 
                    for (let pk of possibleKeys) {
                        let cleanPk = pk.toLowerCase();
                        if (cleanKey === cleanPk) return row[key]; 
                        if (cleanKey.includes(cleanPk)) bestMatch = row[key]; 
                    }
                }
                return bestMatch;
            };

            data.forEach(row => {
                let wordRaw = getVal(row, ['語詞', '單字', '成語']);
                if (!wordRaw || String(wordRaw).trim() === '') return;
                let unitName = getVal(row, ['單元名稱', '單元', '課名']) || "綜合單元";
                let word = String(wordRaw).trim();

                let sentences = [];
                for (let i = 1; i <= 5; i++) {
                    let s = getVal(row, [`造句${i}`]);
                    if (s) sentences.push(String(s).trim());
                }
                let sMain = getVal(row, ['造句']);
                if (sentences.length === 0 && sMain) {
                    sentences = String(sMain).split('\n').map(s => s.trim()).filter(s => s !== '');
                }
                if (sentences.length === 0) sentences.push(`這是一個關於「${word}」的造句。`);

                let opt1Raw = getVal(row, ['選項1', '選項一']);
                let opt2Raw = getVal(row, ['選項2', '選項二']);
                let opt3Raw = getVal(row, ['選項3', '選項三']);
                let opt1 = opt1Raw ? String(opt1Raw).trim() : "";
                let opt2 = opt2Raw ? String(opt2Raw).trim() : "";
                let opt3 = opt3Raw ? String(opt3Raw).trim() : "";
                
                let correctIdx = row['computedCorrectIndex'] !== undefined ? parseInt(row['computedCorrectIndex']) : 0;
                let clueRaw = getVal(row, ['解釋', '提示']);
                let clue = clueRaw ? String(clueRaw).trim() : "請找出這個語詞";
                let questionRaw = getVal(row, ['測驗題目', '題目', '問題']);
                let question = questionRaw ? String(questionRaw).trim() : `請問關於「${word}」的解釋何者最接近？`;

                if (!opt1) opt1 = (correctIdx === 0 ? clue : "錯誤的選項 A");
                if (!opt2) opt2 = (correctIdx === 1 ? clue : "錯誤的選項 B");
                if (!opt3) opt3 = (correctIdx === 2 ? clue : "錯誤的選項 C");

                processed.push({ unit: unitName, word: word, clue: clue, origin: getVal(row, ['典故']) || "尚無典故資料。", sentences: sentences, quiz: { question: question, options: [opt1, opt2, opt3], correctIndex: correctIdx } });
            });
            return processed;
        }

        function renderLobby() {
            const btnContainer = document.getElementById('lesson-buttons');
            btnContainer.innerHTML = '';
            const uniqueUnits = [...new Set(allWordData.map(item => item.unit))];

            uniqueUnits.forEach((unit, index) => {
                const btn = document.createElement('button');
                btn.className = 'lesson-btn';
                const wordCount = allWordData.filter(w => w.unit === unit).length;
                const colors = ['var(--btn-blue)', 'var(--btn-purple)', 'var(--btn-green)', 'var(--btn-orange)'];
                const accentColor = colors[index % colors.length];

                let recordHtml = '';
                if (lessonRecords[unit]) {
                    recordHtml = `
                        <div class="mt-2 pt-2 border-t-2 flex gap-4 text-sm font-bold opacity-90 w-full justify-center" style="border-color: ${accentColor}40;">
                            <span style="color: #D35400;"><i class="fas fa-star text-yellow-500"></i> ${lessonRecords[unit].score}</span>
                            <span style="color: #2980B9;"><i class="fas fa-clock"></i> ${formatTime(lessonRecords[unit].time)}</span>
                        </div>
                    `;
                }

                btn.innerHTML = `
                    <span style="color: ${accentColor}"><i class="fas fa-book"></i> ${unit}</span>
                    <span class="text-sm px-3 py-1 rounded-full border-2" style="border-color: ${accentColor}40; color: var(--text-light); background: white;">包含 ${wordCount} 個語詞</span>
                    ${recordHtml}
                `;
                btn.onclick = () => startGame(unit);
                btnContainer.appendChild(btn);
            });

            document.getElementById('lobby-container').style.display = 'flex';
            document.getElementById('game-container').style.display = 'none';
            const canvas = document.getElementById('fireworks');
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        }

        function returnToLobby() { stopTimer(); renderLobby(); }
        
        function restartGame() {
            // 直接重啟目前的單元進度
            if (currentLessonName) {
                startGame(currentLessonName);
            }
        }

        function startGame(unitName) {
            currentLessonName = unitName;
            currentLessonData = allWordData.filter(item => item.unit === unitName);
            document.getElementById('game-title').innerText = unitName;
            document.getElementById('lobby-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex'; 
            initGame();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeElapsed = 0;
            document.getElementById('time-display').innerText = "00:00";
            timerInterval = setInterval(() => {
                timeElapsed++;
                document.getElementById('time-display').innerText = formatTime(timeElapsed);
            }, 1000);
        }

        function stopTimer() { clearInterval(timerInterval); }
        function formatTime(secs) {
            let m = String(Math.floor(secs / 60)).padStart(2, '0');
            let s = String(secs % 60).padStart(2, '0');
            return `${m}:${s}`;
        }

        function syncPanelHeight() {
            const gridEl = document.getElementById('grid-container');
            const rightPanel = document.getElementById('right-panel');
            if (window.innerWidth >= 768) {
                rightPanel.style.maxHeight = gridEl.offsetHeight + 'px';
            } else {
                rightPanel.style.maxHeight = 'none';
            }
        }
        window.addEventListener('resize', syncPanelHeight);

        function initGame() {
            const maxWordLen = Math.max(...currentLessonData.map(w => w.word.length));
            GRID_SIZE = Math.max(8, Math.min(12, Math.ceil(maxWordLen * 1.3) + Math.floor(currentLessonData.length / 4)));
            
            const allChars = currentLessonData.map(w => w.word).join('');
            const uniqueChars = [...new Set(allChars.split(''))];
            const extraChars = "的是了我不人在他有這一個上們來到時大地為子中你說生國年那就和要她出也得裡後自以會家可下而過天去能對小多然於心學麼起都把好太水作";
            const fillerChars = uniqueChars.join('') + extraChars;

            grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(''));
            placedWordsInfo = []; foundWords = []; perfectWords = []; quizStatus = {}; failedWords = [];
            essayGenerationCount = 0; isEndGameTriggered = false; score = 0; colorIndex = 0; 
            
            document.getElementById('essay-btn-container').classList.add('hidden');
            
            let wordsToPlace = [...currentLessonData].sort(() => 0.5 - Math.random());
            wordsToPlace.forEach(item => placeWord(item.word));
            
            for(let r=0; r<GRID_SIZE; r++) {
                for(let c=0; c<GRID_SIZE; c++) {
                    if(grid[r][c] === '') grid[r][c] = fillerChars.charAt(Math.floor(Math.random() * fillerChars.length));
                }
            }
            
            renderBoard(); renderWordList(); setupInteractions();
            setTimeout(syncPanelHeight, 50);

            document.getElementById('total-count').innerText = currentLessonData.length;
            document.getElementById('found-count').innerText = "0";
            document.getElementById('score-display').innerText = "0";
            startTimer(); 
        }

        function placeWord(word) {
            const dirs = [ {dr:0, dc:1}, {dr:1, dc:0}, {dr:1, dc:1} ];
            for(let attempt=0; attempt<100; attempt++) {
                const dir = dirs[Math.floor(Math.random() * dirs.length)];
                const r = Math.floor(Math.random() * GRID_SIZE);
                const c = Math.floor(Math.random() * GRID_SIZE);
                if (canPlace(word, r, c, dir.dr, dir.dc)) {
                    for(let i=0; i<word.length; i++) grid[r + i*dir.dr][c + i*dir.dc] = word[i];
                    placedWordsInfo.push({ word: word, start: {r, c}, end: {r: r + (word.length-1)*dir.dr, c: c + (word.length-1)*dir.dc} });
                    return;
                }
            }
        }

        function canPlace(word, r, c, dr, dc) {
            for(let i=0; i<word.length; i++) {
                const nr = r + i*dr, nc = c + i*dc;
                if(nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) return false;
                if(grid[nr][nc] !== '' && grid[nr][nc] !== word[i]) return false;
            }
            return true;
        }

        function renderBoard() {
            const board = document.getElementById('grid-container');
            board.innerHTML = ''; 
            board.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
            for(let r=0; r<GRID_SIZE; r++) {
                for(let c=0; c<GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell'; cell.innerText = grid[r][c]; cell.dataset.r = r; cell.dataset.c = c;
                    board.appendChild(cell);
                }
            }
        }

        function renderWordList() {
            const list = document.getElementById('word-list-container');
            list.innerHTML = '';
            const sortedData = [...currentLessonData].sort((a, b) => a.word.length - b.word.length);

            sortedData.forEach(item => {
                const tag = document.createElement('div');
                tag.className = 'word-tag'; tag.id = `word-${item.word}`;
                if (foundWords.includes(item.word)) {
                    tag.classList.add('found');
                    let crownHtml = perfectWords.includes(item.word) ? '<i class="fas fa-crown crown-icon"></i>' : '';
                    tag.innerHTML = `<span>${item.word}</span> ${crownHtml}`;
                } else {
                    tag.innerHTML = `<span>${item.word}</span>`;
                }
                tag.onclick = () => { if(foundWords.includes(item.word)) openModal(item.word); };
                list.appendChild(tag);
            });
        }

        function setupInteractions() {
            const board = document.getElementById('grid-container');
            const newBoard = board.cloneNode(true);
            board.parentNode.replaceChild(newBoard, board);
            
            previewLine = document.createElement('div');
            previewLine.className = 'preview-line'; previewLine.style.display = 'none';
            newBoard.appendChild(previewLine);
            startCell = null;

            newBoard.addEventListener('click', handleBoardClick);
            newBoard.addEventListener('mousemove', handleHoverPreview);
            newBoard.addEventListener('touchmove', (e) => { if (startCell) e.preventDefault(); }, {passive: false});
        }

        function handleBoardClick(e) {
            const target = e.target.nodeType === 3 ? e.target.parentNode : e.target;
            const cell = target.closest('.cell');
            if (!cell) return;

            const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
            if (!startCell) {
                startCell = cell; cell.classList.add('selected'); updatePreviewLine(cell, cell);
            } else {
                if (startCell === cell) { clearSelection(); return; }
                const startR = parseInt(startCell.dataset.r), startC = parseInt(startCell.dataset.c);
                const dr = r - startR, dc = c - startC;
                if (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) {
                    checkConnection(startR, startC, r, c);
                } else {
                    clearSelection(); startCell = cell; cell.classList.add('selected'); updatePreviewLine(cell, cell);
                }
            }
        }

        function handleHoverPreview(e) {
            if (!startCell) return;
            const target = e.target.nodeType === 3 ? e.target.parentNode : e.target;
            const currentCell = target.closest('.cell');
            clearPathPreview();

            if (!currentCell) { if (previewLine) previewLine.style.display = 'none'; return; }
            const startR = parseInt(startCell.dataset.r), startC = parseInt(startCell.dataset.c);
            const currR = parseInt(currentCell.dataset.r), currC = parseInt(currentCell.dataset.c);

            const dr = currR - startR, dc = currC - startC;
            if (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) {
                updatePreviewLine(startCell, currentCell);
                const stepR = Math.sign(dr), stepC = Math.sign(dc), steps = Math.max(Math.abs(dr), Math.abs(dc));
                for (let i = 0; i <= steps; i++) {
                    let r = startR + i * stepR, c = startC + i * stepC;
                    let cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
                    if (cell && cell !== startCell) cell.classList.add('path-preview');
                }
            } else {
                if (previewLine) previewLine.style.display = 'none';
            }
        }

        function clearPathPreview() { document.querySelectorAll('.cell.path-preview').forEach(cell => cell.classList.remove('path-preview')); }

        function updatePreviewLine(cellA, cellB) {
            if (!previewLine) return;
            const boardBox = document.getElementById('grid-container').getBoundingClientRect();
            const boxA = cellA.getBoundingClientRect(), boxB = cellB.getBoundingClientRect();
            const x1 = boxA.left + boxA.width/2 - boardBox.left, y1 = boxA.top + boxA.height/2 - boardBox.top;
            const x2 = boxB.left + boxB.width/2 - boardBox.left, y2 = boxB.top + boxB.height/2 - boardBox.top;
            const distance = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;

            previewLine.style.height = `${boxA.height * 0.8}px`; 
            previewLine.style.width = `${distance + boxA.width * 0.8}px`; 
            previewLine.style.left = `${x1 - (boxA.width * 0.4)}px`;
            previewLine.style.top = `${y1 - (boxA.height * 0.4)}px`;
            previewLine.style.transform = `rotate(${angle}deg)`;
            previewLine.style.display = 'block';
        }

        function clearSelection() {
            if (startCell) startCell.classList.remove('selected');
            startCell = null;
            if (previewLine) previewLine.style.display = 'none';
            clearPathPreview();
        }

        function checkConnection(r1, c1, r2, c2) {
            const dr = Math.sign(r2 - r1), dc = Math.sign(c2 - c1), steps = Math.max(Math.abs(r2 - r1), Math.abs(c2 - c1));
            let selectedWord = "", cellsToMark = [];

            for (let i = 0; i <= steps; i++) {
                let r = r1 + i * dr, c = c1 + i * dc;
                selectedWord += grid[r][c];
                cellsToMark.push(document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`));
            }

            const reversedWord = selectedWord.split('').reverse().join('');
            let matchedWord = null;
            if (currentLessonData.some(w => w.word === selectedWord)) matchedWord = selectedWord;
            else if (currentLessonData.some(w => w.word === reversedWord)) matchedWord = reversedWord;

            if (matchedWord && !foundWords.includes(matchedWord)) {
                foundWords.push(matchedWord);
                const color = earthTonePalette[colorIndex % earthTonePalette.length]; colorIndex++;
                
                cellsToMark.forEach(cell => {
                    if(cell) {
                        cell.classList.remove('selected'); cell.classList.add('found');
                        if (!cell._foundColors) cell._foundColors = [];
                        if (!cell._foundColors.includes(color.bg)) cell._foundColors.push(color.bg);
                        if (cell._foundColors.length === 1) {
                            cell.style.setProperty('background', cell._foundColors[0], 'important');
                        } else {
                            const gradient = `linear-gradient(135deg, ${cell._foundColors.join(', ')})`;
                            cell.style.setProperty('background', gradient, 'important');
                        }
                        cell.style.setProperty('border-color', color.border, 'important');
                        cell.style.setProperty('color', color.text, 'important');
                    }
                });
                
                const tag = document.getElementById(`word-${matchedWord}`);
                if (tag) {
                    tag.classList.add('found');
                    let existingCrown = tag.querySelector('.crown-icon') ? '<i class="fas fa-crown crown-icon"></i>' : '';
                    tag.innerHTML = `<span>${matchedWord}</span> ${existingCrown}`;
                    tag.style.setProperty('background-color', color.bg, 'important');
                    tag.style.setProperty('border-color', color.border, 'important');
                    tag.style.setProperty('color', color.text, 'important');
                    tag.style.setProperty('box-shadow', `0 4px 0 ${color.border}`, 'important');
                }
                
                score += matchedWord.length * 50;
                document.getElementById('score-display').innerText = score;
                document.getElementById('found-count').innerText = foundWords.length;
                setTimeout(() => openModal(matchedWord), 400);

                if (foundWords.length === currentLessonData.length) stopTimer();
            }
            clearSelection();
        }

        function openModal(word) {
            currentModalWord = word; currentSentenceIdx = 0; 
            const target = currentLessonData.find(w => w.word === word);
            document.getElementById('modal-word').innerText = word;
            document.getElementById('modal-meaning').innerHTML = target.clue.replace(/\n/g, '<br>');
            document.querySelector('.meaning-box').style.display = 'block';
            document.getElementById('learning-modal').classList.add('show');
            showContent('none'); 
            
            document.getElementById('btn-ai-sentence').disabled = false;
            document.getElementById('btn-ai-sentence').innerHTML = '<i class="fas fa-pencil-alt"></i> 造句';
            const btnQuiz = document.getElementById('btn-ai-quiz');
            if (quizStatus[word]) {
                btnQuiz.innerHTML = '<i class="fas fa-lock"></i> 測驗結束'; btnQuiz.disabled = true;
            } else {
                btnQuiz.innerHTML = '<i class="fas fa-question-circle"></i> 測驗'; btnQuiz.disabled = false;
            }
        }

        function closeModal() {
            document.getElementById('learning-modal').classList.remove('show');
            currentModalWord = null;

            // 觸發結算流程
            if (foundWords.length === currentLessonData.length && Object.keys(quizStatus).length === currentLessonData.length && !isEndGameTriggered) {
                isEndGameTriggered = true; 
                if (!lessonRecords[currentLessonName] || score > lessonRecords[currentLessonName].score) {
                    lessonRecords[currentLessonName] = { score: score, time: timeElapsed };
                }
                document.getElementById('essay-btn-container').classList.remove('hidden'); // 解鎖短文測驗按鈕
                setTimeout(() => showGameOverModal(score, timeElapsed), 500); 
            }
        }

        function showGameOverModal(finalScore, finalTime) {
            document.getElementById('final-score').innerText = finalScore;
            document.getElementById('final-time').innerText = formatTime(finalTime);
            document.getElementById('game-over-modal').classList.add('show');
            showWinEffect();
        }

        async function showContent(type) {
            const target = currentLessonData.find(w => w.word === currentModalWord);
            if(!target) return;
            document.querySelectorAll('.content-box').forEach(b => b.classList.remove('show'));
            const meaningBox = document.querySelector('.meaning-box');
            if (type === 'quiz') meaningBox.style.display = 'none'; else meaningBox.style.display = 'block';
            if(type === 'none') return;

            const btn = document.getElementById(`btn-ai-${type}`);
            const contentBox = document.getElementById('content-box'), quizBox = document.getElementById('quiz-box');
            const colorMap = { 'sentence': 'var(--btn-blue)', 'quiz': 'var(--btn-green)' };
            document.getElementById('modal-color-bar').style.background = colorMap[type];

            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> 思考中`;
            document.querySelectorAll('#modal-buttons button').forEach(b => b.disabled = true);
            await new Promise(resolve => setTimeout(resolve, 600));

            if (type === 'sentence') {
                const sentence = target.sentences[currentSentenceIdx];
                contentBox.className = 'content-box box-sentence show';
                contentBox.innerHTML = `<div class="font-bold mb-2 opacity-80"><i class="fas fa-quote-left"></i> 例句參考：</div><div class="text-lg font-bold">${sentence}</div>`;
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> 下一句';
                currentSentenceIdx = (currentSentenceIdx + 1) % target.sentences.length;
            } else if (type === 'quiz') {
                quizBox.classList.add('show');
                document.getElementById('quiz-question').innerText = target.quiz.question;
                const optsContainer = document.getElementById('quiz-options');
                optsContainer.innerHTML = '';
                
                let optionsWithIndex = target.quiz.options.map((opt, i) => ({ text: opt, originalIndex: i }));
                if (!quizStatus[currentModalWord]) {
                    for (let i = optionsWithIndex.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [optionsWithIndex[i], optionsWithIndex[j]] = [optionsWithIndex[j], optionsWithIndex[i]];
                    }
                    target.quiz.shuffledOptions = optionsWithIndex;
                } else optionsWithIndex = target.quiz.shuffledOptions || optionsWithIndex;

                optionsWithIndex.forEach((optObj) => {
                    const div = document.createElement('div');
                    div.className = 'quiz-option'; div.innerText = optObj.text;
                    if (quizStatus[currentModalWord]) {
                        div.style.pointerEvents = 'none';
                        if (optObj.originalIndex === target.quiz.correctIndex) {
                            div.classList.add('correct'); div.innerHTML += ' <i class="fas fa-check float-right mt-1"></i>';
                        } else if (quizStatus[currentModalWord] === 'wrong' && optObj.wasSelected) {
                            div.classList.add('wrong'); div.innerHTML += ' <i class="fas fa-times float-right mt-1"></i>';
                        }
                    } else {
                        div.onclick = function() {
                            const allOpts = document.querySelectorAll('.quiz-option');
                            allOpts.forEach(o => o.style.pointerEvents = 'none'); 
                            if (optObj.originalIndex === target.quiz.correctIndex) {
                                quizStatus[currentModalWord] = 'correct'; this.classList.add('correct');
                                this.innerHTML += ' <span class="plus-50">+50分!</span> <i class="fas fa-check float-right mt-1"></i>';
                                score += 50; document.getElementById('score-display').innerText = score;
                                if (!perfectWords.includes(currentModalWord)) perfectWords.push(currentModalWord);
                                const wordTag = document.getElementById(`word-${currentModalWord}`);
                                if (wordTag && !wordTag.querySelector('.crown-icon')) wordTag.innerHTML += '<i class="fas fa-crown crown-icon"></i>';
                            } else {
                                quizStatus[currentModalWord] = 'wrong'; optObj.wasSelected = true; 
                                if (!failedWords.includes(currentModalWord)) failedWords.push(currentModalWord);
                                this.classList.add('wrong'); this.innerHTML += ' <i class="fas fa-times float-right mt-1"></i>';
                                const correctDiv = Array.from(allOpts).find(el => el.innerText.includes(target.quiz.options[target.quiz.correctIndex]));
                                if(correctDiv) correctDiv.classList.add('correct');
                            }
                            const quizBtn = document.getElementById('btn-ai-quiz');
                            quizBtn.innerHTML = '<i class="fas fa-lock"></i> 測驗結束'; quizBtn.disabled = true;
                            
                            // 即時檢查是否可以解鎖短文按鈕 (提早做完)
                            if (Object.keys(quizStatus).length === currentLessonData.length && foundWords.length === currentLessonData.length) {
                                document.getElementById('essay-btn-container').classList.remove('hidden');
                            }
                        };
                    }
                    optsContainer.appendChild(div);
                });
            }
            const btnSentence = document.getElementById('btn-ai-sentence'), btnQuiz = document.getElementById('btn-ai-quiz');
            btnSentence.disabled = false;
            btnSentence.innerHTML = type === 'sentence' ? '<i class="fas fa-sync-alt"></i> 下一句' : '<i class="fas fa-pencil-alt"></i> 造句';
            if (quizStatus[currentModalWord]) { btnQuiz.innerHTML = '<i class="fas fa-lock"></i> 測驗結束'; btnQuiz.disabled = true; }
            else { btnQuiz.innerHTML = '<i class="fas fa-question-circle"></i> 測驗'; btnQuiz.disabled = false; }
        }

        async function startFillInTheBlankTest() {
            const modal = document.getElementById('fill-blank-modal'), loadingBox = document.getElementById('fb-loading'), contentBox = document.getElementById('fb-content');
            loadingBox.innerHTML = `<i class="fas fa-pen-fancy text-4xl mb-4 text-purple-400 animate-pulse"></i><p class="text-lg font-bold text-gray-600">AI 老師正在為你量身打造專屬短文<span class="loading-dots"></span></p>`;
            modal.classList.add('show'); loadingBox.classList.remove('hidden'); contentBox.classList.add('hidden'); contentBox.classList.remove('flex');
            selectedTouchWord = null; 
            essayGenerationCount++;
            
            let targetCount = Math.floor(Math.random() * 3) + 5; 
            targetCount = Math.min(targetCount, currentLessonData.length); 
            let wordsToUse = [];
            const allWords = currentLessonData.map(w => w.word);

            // 當字數過少時強制使用全部
            if (allWords.length <= 5) {
                wordsToUse = [...allWords];
            } else if (essayGenerationCount === 1) {
                let shuffledFailed = [...failedWords].sort(() => 0.5 - Math.random());
                wordsToUse = shuffledFailed.slice(0, targetCount);
                if (wordsToUse.length < targetCount) {
                    let remainingWords = allWords.filter(w => !wordsToUse.includes(w)).sort(() => 0.5 - Math.random());
                    wordsToUse = wordsToUse.concat(remainingWords.slice(0, targetCount - wordsToUse.length));
                }
            } else {
                wordsToUse = [...allWords].sort(() => 0.5 - Math.random()).slice(0, targetCount);
            }

            const wordsList = wordsToUse.join('、');
            // 強制格式與長度的 Prompt
            const prompt = `你是優秀的兒童故事作家。
任務：創作一篇適合國小高年級學生的短文（日常校園、溫馨家庭或有趣探險）。
長度限制：絕對不可超過 450 字，最多分四個段落。
必須使用的語詞：${wordsList}。
要求：
1. 故事必須有完整結尾，不可以突然中斷。
2. 只要寫出故事純文字即可，請把指定的語詞自然寫進句子裡。
3. 絕對不要加上大括號、星號或其他特殊符號。`;

            try {
                let aiText = await callGeminiAPI(prompt);
                
                // 強制挖空防呆機制 (保證 100% 成功)
                let processedText = aiText;
                processedText = processedText.replace(/\{/g, '').replace(/\}/g, ''); // 清理多餘括號
                
                let usedWordsInEssay = []; // 追蹤真正有在文章中出現的詞
                wordsToUse.forEach(w => {
                    if (processedText.includes(w)) {
                        let regex = new RegExp(w, "g");
                        processedText = processedText.replace(regex, `{${w}}`);
                        usedWordsInEssay.push(w);
                    }
                });

                if (usedWordsInEssay.length === 0) throw new Error("AI 文章未包含任何指定語詞");

                const articleContainer = document.getElementById('article-container'), bankContainer = document.getElementById('word-bank-container');
                articleContainer.innerHTML = ''; bankContainer.innerHTML = '';

                const parts = processedText.split(/\{(.*?)\}/g);
                let dropzoneHtml = '';
                let wordsToBank = [];

                parts.forEach((part, index) => {
                    if (index % 2 === 0) {
                        dropzoneHtml += part.replace(/\n/g, '<br>');
                    } else {
                        let cleanWord = part.trim();
                        if (cleanWord && usedWordsInEssay.includes(cleanWord)) {
                            dropzoneHtml += `<span class="dropzone" data-answer="${cleanWord}"></span>`;
                            wordsToBank.push(cleanWord);
                        }
                    }
                });

                articleContainer.innerHTML = dropzoneHtml;
                wordsToBank.sort(() => Math.random() - 0.5); // 打亂

                wordsToBank.forEach((w, i) => {
                    const wDiv = document.createElement('div');
                    wDiv.className = 'drag-word'; wDiv.innerText = w; wDiv.draggable = true; wDiv.id = 'drag-word-' + i;
                    wDiv.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('text/plain', w); e.dataTransfer.setData('source-id', wDiv.id);
                    });
                    wDiv.addEventListener('click', () => {
                        document.querySelectorAll('.drag-word').forEach(el => el.classList.remove('selected-for-touch'));
                        wDiv.classList.add('selected-for-touch');
                        selectedTouchWord = { word: w, id: wDiv.id, el: wDiv };
                    });
                    bankContainer.appendChild(wDiv);
                });

                document.querySelectorAll('.dropzone').forEach(zone => {
                    zone.addEventListener('dragover', e => { e.preventDefault(); if (!zone.classList.contains('correct')) zone.classList.add('active-target'); });
                    zone.addEventListener('dragleave', () => zone.classList.remove('active-target'));
                    zone.addEventListener('drop', e => {
                        e.preventDefault(); zone.classList.remove('active-target');
                        if (zone.classList.contains('correct')) return;
                        const draggedWord = e.dataTransfer.getData('text/plain'), sourceId = e.dataTransfer.getData('source-id');
                        checkDropAnswer(zone, draggedWord, document.getElementById(sourceId));
                    });
                    zone.addEventListener('click', () => {
                        if (zone.classList.contains('correct') || !selectedTouchWord) return;
                        checkDropAnswer(zone, selectedTouchWord.word, selectedTouchWord.el);
                        document.querySelectorAll('.drag-word').forEach(el => el.classList.remove('selected-for-touch'));
                        selectedTouchWord = null;
                    });
                });

                loadingBox.classList.add('hidden'); contentBox.classList.add('flex'); contentBox.classList.remove('hidden');

            } catch (err) {
                console.error("AI 填空生成失敗", err);
                loadingBox.innerHTML = `
                    <i class="fas fa-exclamation-triangle text-4xl mb-4 text-red-400"></i>
                    <p class="text-lg font-bold text-red-600 mb-2">AI 連線失敗，請檢查網路環境</p>
                    <button onclick="document.getElementById('fill-blank-modal').classList.remove('show');" class="btn btn-quiz mt-4">關閉視窗</button>
                `;
            }
        }

        function checkDropAnswer(zone, word, sourceEl) {
            const correctAnswer = zone.dataset.answer;
            if (word === correctAnswer) {
                zone.innerText = word; zone.classList.add('correct'); zone.classList.remove('wrong');
                if (sourceEl) sourceEl.classList.add('used');
                const totalZones = document.querySelectorAll('.dropzone').length, correctZones = document.querySelectorAll('.dropzone.correct').length;
                if (totalZones === correctZones) {
                    setTimeout(() => {
                        document.getElementById('fill-blank-modal').classList.remove('show');
                        alert("🎉 太棒了！您已成功完成本篇短文填空！"); 
                    }, 1000);
                }
            } else {
                zone.innerText = word; zone.classList.add('wrong');
                setTimeout(() => { if (!zone.classList.contains('correct')) { zone.innerText = ''; zone.classList.remove('wrong'); } }, 800);
            }
        }

        function showWinEffect() {
            const canvas = document.getElementById('fireworks'); const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const particles = [], colors = ['#A8B8C2', '#C2B8CC', '#B5C4B1', '#D4BBA5', '#D8D2CB'];
            function createExplosion(x, y) {
                for (let i = 0; i < 60; i++) particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12, life: 1, color: colors[Math.floor(Math.random() * colors.length)] });
            }
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.02;
                    ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
                    if (p.life <= 0) particles.splice(i, 1);
                }
                if (particles.length > 0) requestAnimationFrame(animate); else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            createExplosion(canvas.width/2, canvas.height/3);
            setTimeout(() => createExplosion(canvas.width/3, canvas.height/2), 300);
            setTimeout(() => createExplosion(canvas.width*2/3, canvas.height/2), 600);
            animate();
        }
    </script>
