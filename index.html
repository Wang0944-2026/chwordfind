<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬年成語找字大作戰 (AI旗艦版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap');

        body {
            font-family: 'Zen Maru Gothic', 'Microsoft JhengHei', sans-serif;
            background-color: #FFF3E0;
            background-image: 
                radial-gradient(#FFE0B2 20%, transparent 20%), 
                radial-gradient(#FFE0B2 20%, transparent 20%);
            background-position: 0 0, 40px 40px;
            background-size: 80px 80px;
            overflow-x: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        .game-container {
            max-width: 900px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* 頂部資訊列 */
        .header-panel {
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 6px 0 #E0E0E0;
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 25px;
            width: fit-content;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 字海網格 */
        .word-search-grid {
            display: grid;
            gap: 6px;
            background-color: #ffffff;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 8px solid #FFCC80;
            position: relative;
            touch-action: none;
            margin-bottom: 20px;
        }

        .cell {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #FAFAFA;
            border-radius: 10px;
            font-weight: bold;
            font-size: 20px;
            color: #5D4037;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #EEE;
            box-shadow: 0 2px 0 #DDD;
        }

        .cell:hover {
            background-color: #FFF8E1;
            transform: translateY(-2px);
        }

        .cell.selected {
            background-color: #B2EBF2;
            border-color: #00BCD4;
            color: #006064;
            transform: scale(1.1);
            box-shadow: 0 4px 0 #0097A7;
            z-index: 10;
        }

        .cell.found {
            background-color: #C8E6C9 !important;
            border-color: #4CAF50 !important;
            color: #1B5E20 !important;
            box-shadow: none !important;
            animation: pop 0.4s ease;
        }

        /* 愛心樣式 */
        .heart {
            color: #FF5252;
            font-size: 28px;
            transition: transform 0.3s;
            filter: drop-shadow(0 2px 0 #C62828);
        }
        .heart.lost {
            color: #E0E0E0;
            transform: scale(0.8);
            filter: none;
        }

        /* 底部成語清單 */
        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 600px;
        }
        
        .word-tag {
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 16px;
            color: #888;
            border: 2px dashed #CCC;
            transition: all 0.3s;
        }

        .word-tag.found {
            background: #81C784;
            color: white;
            border: 2px solid #4CAF50;
            font-weight: bold;
            text-decoration: none;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 90%;
            width: 500px;
            border: 8px solid #FFAB40;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.show .modal-content {
            transform: scale(1);
        }

        .meaning-box {
            background: #FFF3E0;
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
            color: #5D4037;
            text-align: left;
            font-size: 1.1rem;
            line-height: 1.6;
            border-left: 5px solid #FF9800;
            width: 100%;
        }

        .ai-box {
            background: #F3E5F5;
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
            color: #4A148C;
            text-align: left;
            font-size: 1rem;
            line-height: 1.6;
            border-left: 5px solid #9C27B0;
            width: 100%;
            display: none;
        }
        
        .ai-box.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        .quiz-box {
            background: #E0F2F1;
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
            color: #00695C;
            text-align: left;
            font-size: 1rem;
            border-left: 5px solid #009688;
            width: 100%;
            display: none;
        }
        
        .quiz-box.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        .quiz-option {
            background: white;
            border: 2px solid #80CBC4;
            padding: 8px 12px;
            margin-top: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quiz-option:hover { background: #B2DFDB; }
        .quiz-option.correct { background: #C8E6C9; border-color: #4CAF50; color: #1B5E20; }
        .quiz-option.wrong { background: #FFCDD2; border-color: #EF5350; color: #B71C1C; }

        .story-box {
            background: #E3F2FD;
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
            color: #0D47A1;
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.6;
            border-left: 5px solid #2196F3;
            width: 100%;
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .story-box.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        /* Image Display Area */
        .image-display {
            width: 100%;
            height: 200px;
            background: #EEE;
            border-radius: 15px;
            margin: 10px 0;
            display: none;
            background-size: cover;
            background-position: center;
            border: 4px solid #FFAB40;
            position: relative;
        }
        
        .image-display.show {
            display: block;
            animation: pop 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            background: #4DD0E1;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #0097A7;
            transition: all 0.1s;
            margin: 4px;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        
        .btn:disabled {
            background-color: #B0BEC5;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .btn-ai { background: #BA68C8; box-shadow: 0 4px 0 #7B1FA2; }
        .btn-ai:hover { background: #AB47BC; }
        
        .btn-origin { background: #FF7043; box-shadow: 0 4px 0 #D84315; }
        .btn-origin:hover { background: #F4511E; }

        .btn-draw { background: #FF4081; box-shadow: 0 4px 0 #C51162; }
        .btn-draw:hover { background: #F50057; }

        .btn-quiz { background: #009688; box-shadow: 0 4px 0 #00695C; }
        .btn-quiz:hover { background: #00796B; }

        .btn-story {
            background: #42A5F5;
            box-shadow: 0 4px 0 #1565C0;
            font-size: 1.1rem;
            padding: 12px 25px;
        }

        .btn-hint {
            background: #FFB74D;
            box-shadow: 0 4px 0 #F57C00;
            padding: 8px 20px;
            font-size: 1rem;
        }
        
        /* 載入動畫 */
        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.5s; }
        
        @keyframes pop {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @media (max-width: 600px) {
            .cell { width: 32px; height: 32px; font-size: 16px; gap: 4px; }
            .word-search-grid { gap: 4px; padding: 10px; }
            .header-panel { gap: 10px; padding: 8px 15px; }
            .btn { padding: 8px 12px; font-size: 0.85rem; }
            .modal-content { padding: 20px; width: 95%; }
            .flex-wrap { gap: 4px; }
        }
    </style>
</head>

<script>
    // --- Gemini & Imagen API ---
    const apiKey = ""; 

    async function callGeminiAPI(promptText, isJson = false) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const payload = {
            contents: [{ parts: [{ text: promptText }] }]
        };

        // 若需要 JSON 格式，則啟用強制結構化輸出
        if (isJson) {
            payload.generationConfig = {
                responseMimeType: "application/json",
                responseSchema: {
                    type: "OBJECT",
                    properties: {
                        question: { type: "STRING" },
                        options: { type: "ARRAY", items: { type: "STRING" } },
                        correctIndex: { type: "INTEGER" }
                    },
                    required: ["question", "options", "correctIndex"]
                }
            };
        }

        const delays = [1000, 2000, 4000, 8000, 16000];
        let lastError;

        // 實作指數型退避重試 (Exponential Backoff)
        for (let i = 0; i <= delays.length; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) throw new Error(`連線錯誤 (${response.status})`);
                
                const data = await response.json();
                if (data.candidates && data.candidates[0].content) {
                    return data.candidates[0].content.parts[0].text;
                } else {
                    throw new Error("回傳格式異常");
                }
            } catch (error) {
                lastError = error;
                if (i < delays.length) {
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }
        throw new Error("AI 暫時連線不穩，請稍後重試。");
    }

    async function callImagenAPI(promptText) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
        const payload = {
            instances: [{ prompt: promptText }],
            parameters: { sampleCount: 1 }
        };

        const delays = [1000, 2000, 4000, 8000, 16000];
        for (let i = 0; i <= delays.length; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error(`連線錯誤 (${response.status})`);
                const data = await response.json();
                return data.predictions[0].bytesBase64Encoded;
            } catch (error) {
                if (i === delays.length) throw new Error("繪圖失敗");
                await new Promise(resolve => setTimeout(resolve, delays[i]));
            }
        }
    }

    // --- Game Data ---

            sentences: [

                "大家合作無間，讓這次的校慶活動馬到成功。",
                "只要充滿信心，做什麼事情都能馬到成功。",
                "教練鼓勵隊員們，預祝大家在明天的比賽馬到成功。"
            ],

                correctIndex: 0

        },
        {

            sentences: [

            sentences: [

    function generateGrid() {
        grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(null));
        placedWords = [];
        let wordsToPlace = [...wordData].sort(() => 0.5 - Math.random());

        for (let wordObj of wordsToPlace) {
            placeWord(wordObj);
        }

        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                if (grid[r][c] === null) {
                    grid[r][c] = {
                        char: fillerChars[Math.floor(Math.random() * fillerChars.length)],
                        isTarget: false
                    };
                }
            }
        }
    }

    function placeWord(wordObj) {
        const directions = [ {dr: 0, dc: 1}, {dr: 1, dc: 0}, {dr: 1, dc: 1} ];
        for (let attempt = 0; attempt < 100; attempt++) {
            const dir = directions[Math.floor(Math.random() * directions.length)];
            const word = wordObj.word;
            const len = word.length;
            let startR = Math.floor(Math.random() * GRID_SIZE);
            let startC = Math.floor(Math.random() * GRID_SIZE);
            let endR = startR + (len - 1) * dir.dr;
            let endC = startC + (len - 1) * dir.dc;

            if (endR >= GRID_SIZE || endC >= GRID_SIZE) continue;

            let canPlace = true;
            for (let i = 0; i < len; i++) {
                let r = startR + i * dir.dr;
                let c = startC + i * dir.dc;
                if (grid[r][c] !== null && grid[r][c].char !== word[i]) {
                    canPlace = false;
                    break;
                }
            }

            if (canPlace) {
                let wordCells = [];
                for (let i = 0; i < len; i++) {
                    let r = startR + i * dir.dr;
                    let c = startC + i * dir.dc;
                    grid[r][c] = { char: word[i], isTarget: true };
                    wordCells.push({r, c});
                }
                placedWords.push({
                    word: word,
                    clue: wordObj.clue,
                    cells: wordCells,
                    start: {r: startR, c: startC},
                    end: {r: endR, c: endC}
                });
                return;
            }
        }
    }

    function renderGrid() {
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        container.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
        
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = grid[r][c].char;
                cell.dataset.r = r;
                cell.dataset.c = c;
                cell.onclick = () => handleCellClick(r, c);
                container.appendChild(cell);
            }
        }
    }

    function renderWordList() {
        const list = document.getElementById('word-list-container');
        list.innerHTML = '';
        wordData.forEach(w => {
            // 修改：只有當成語被找到時才顯示 (移除下方的提示)
            if (foundWords.includes(w.word)) {
                const tag = document.createElement('div');
                tag.className = 'word-tag found';
                tag.innerHTML = `<i class="fas fa-check"></i> ${w.word}`;
                list.appendChild(tag);
            }
        });
    }

    function handleCellClick(r, c) {
        if (lives <= 0) return;
        if (isCellFound(r, c)) return;

        if (!selectionStart) {
            selectionStart = {r, c};
            highlightCell(r, c, true);
        } else {
            const start = selectionStart;
            const end = {r, c};
            if (start.r === end.r && start.c === end.c) {
                clearSelection();
                return;
            }
            checkSelection(start, end);
            clearSelection();
        }
    }

    function isCellFound(r, c) {
        const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
        return cell && cell.classList.contains('found');
    }

    function highlightCell(r, c, active) {
        const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
        if (active) cell.classList.add('selected');
        else cell.classList.remove('selected');
    }

    function clearSelection() {
        selectionStart = null;
        document.querySelectorAll('.cell.selected').forEach(el => el.classList.remove('selected'));
    }

    function checkSelection(start, end) {
        const dr = end.r - start.r;
        const dc = end.c - start.c;
        const isHorizontal = (dr === 0);
        const isVertical = (dc === 0);
        const isDiagonal = (Math.abs(dr) === Math.abs(dc));

        if (!isHorizontal && !isVertical && !isDiagonal) {
            handleError();
            return;
        }

        const steps = Math.max(Math.abs(dr), Math.abs(dc));
        const stepR = dr === 0 ? 0 : dr / Math.abs(dr);
        const stepC = dc === 0 ? 0 : dc / Math.abs(dc);

        let selectedWord = "";
        let selectedPath = [];

        for (let i = 0; i <= steps; i++) {
            let r = start.r + i * stepR;
            let c = start.c + i * stepC;
            selectedWord += grid[r][c].char;
            selectedPath.push({r, c});
        }

        const reversedWord = selectedWord.split('').reverse().join('');
        const target = placedWords.find(pw => pw.word === selectedWord || pw.word === reversedWord);

        if (target && !foundWords.includes(target.word)) {
            foundWords.push(target.word);
            score += 100;
            selectedPath.forEach(pos => {
                const cell = document.querySelector(`.cell[data-r="${pos.r}"][data-c="${pos.c}"]`);
                cell.classList.add('found');
            });
            updateUI();
            renderWordList();
            showMeaning(target);
            if (foundWords.length === wordData.length) {
                setTimeout(gameWin, 1500);
            }
        } else {
            handleError();
        }
    }

    function handleError() {
        lives--;
        updateUI();
        const gridEl = document.getElementById('grid-container');
        gridEl.classList.add('shake');
        setTimeout(() => gridEl.classList.remove('shake'), 500);
        if (lives <= 0) setTimeout(gameOver, 500);
    }

        document.getElementById('img-loading').style.display = 'flex';
        
        // Hide others
        document.getElementById('ai-content-box').classList.remove('show');
        document.getElementById('ai-quiz-box').classList.remove('show');

        // English prompt for better result
        const prompt = `Cute cartoon illustration of the Chinese idiom ${currentModalWord}. Bright colors, children's book style, high quality.`;
        
        try {
            const base64 = await callImagenAPI(prompt);
            box.style.backgroundImage = `url(data:image/png;base64,${base64})`;
            document.getElementById('img-loading').style.display = 'none';
            btn.innerHTML = '<i class="fas fa-check"></i> 完成';
        } catch (e) {
             document.getElementById('img-loading').innerHTML = '<span class="text-red-500">繪圖失敗，請重試</span>';
             btn.innerHTML = '重試';
        }
        
        enableAllModalBtns();
        if (btn.innerHTML.includes('完成')) btn.disabled = true;
    }

    async function getAIQuiz() {
        const btn = document.getElementById('btn-ai-quiz');
        const box = document.getElementById('ai-quiz-box');
        
        if (!currentModalWord) return;
        disableAllModalBtns();
        
        box.classList.add('show');
        document.getElementById('ai-content-box').classList.remove('show');
        document.getElementById('ai-image-box').classList.remove('show');

        // 顯示思考中的狀態
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 出題中...';
        document.getElementById('quiz-question').innerHTML = 'AI 老師正在設計有趣的測驗題...<span class="loading-dots"></span>';
        const optsContainer = document.getElementById('quiz-options');
        optsContainer.innerHTML = ''; // 清空選項
        
        // 模擬 AI 思考延遲
        await new Promise(resolve => setTimeout(resolve, 1200));

        const target = wordData.find(w => w.word === currentModalWord);
        const quizData = target.quiz;
        
        document.getElementById('quiz-question').innerText = quizData.question;
        
        quizData.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'quiz-option';
            div.innerText = opt;
            div.onclick = function() {
                // Check answer
                const allOpts = document.querySelectorAll('.quiz-option');
                allOpts.forEach(o => o.style.pointerEvents = 'none'); // disable clicks
                
                if (idx === quizData.correctIndex) {
                    this.classList.add('correct');
                    this.innerHTML += ' <i class="fas fa-check"></i> 正確！+50分';
                    score += 50;
                    document.getElementById('score-display').innerText = score;
                } else {
                    this.classList.add('wrong');
                    allOpts[quizData.correctIndex].classList.add('correct');
                }
            };
            optsContainer.appendChild(div);
        });
        
        btn.innerHTML = '<i class="fas fa-check"></i> 完成';
        enableAllModalBtns();
        btn.disabled = true;
    }

    function disableAllModalBtns() {
        document.querySelectorAll('#modal-buttons button').forEach(b => b.disabled = true);
    }
    
    function enableAllModalBtns() {
        document.querySelectorAll('#modal-buttons button').forEach(b => {
            // Don't re-enable buttons that are already "done"
            if (!b.innerHTML.includes('完成')) b.disabled = false;
        });
        
        // 確保「換一句」按鈕永遠可以點
        const sentenceBtn = document.getElementById('btn-ai-sentence');
        if (sentenceBtn.innerHTML.includes('換一句')) {
            sentenceBtn.disabled = false;
        }
    }

    async function getAIHint() {
        const unfoundWords = wordData.filter(w => !foundWords.includes(w.word));
        if (unfoundWords.length === 0) return;

        const target = unfoundWords[Math.floor(Math.random() * unfoundWords.length)];
        const modal = document.getElementById('hint-modal');
        const content = document.getElementById('hint-content');
        
        modal.classList.add('show');
        content.innerHTML = `AI 老師正在想一個關於某個成語的謎題...<span class="loading-dots"></span>`;

        // 加上一點視覺緩衝時間，讓玩家看清楚動畫
        await new Promise(resolve => setTimeout(resolve, 1000));

        const prompt = `請為成語「${target.word}」設計一個簡單有趣的謎語或提示，適合小學生猜。
        規則：
        1. 絕對**不能**直接提到「${target.word}」這四個字。
        2. 提示要短一點，大約兩句話。
        3. 最後加上一句話：「猜猜看這是哪個成語？」`;

        const result = await callGeminiAPI(prompt);
        content.innerHTML = result.replace(/\n/g, '<br>');
    }

    async function getAIStory() {
        const btn = document.getElementById('btn-ai-story');
        const box = document.getElementById('ai-story-box');
        const content = document.getElementById('ai-story-text');

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 創作中...';
        box.classList.add('show');
        content.innerHTML = 'AI 正在把所有的馬年成語編成一個精彩的冒險故事...<span class="loading-dots"></span>';

        const idioms = wordData.map(w => w.word).join('、');
        const prompt = `恭喜玩家完成了「馬年成語遊戲」。請使用這 10 個成語：${idioms}，創作一個約 200 字的短篇童話冒險故事，主角是一隻勇敢的小馬。請將用到的成語**加粗**顯示。`;

        const result = await callGeminiAPI(prompt);
        const formattedResult = result.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        content.innerHTML = formattedResult.replace(/\n/g, '<br>');
        btn.innerHTML = '<i class="fas fa-check"></i> 故事完成';
    }

    function closeMeaningModal() {
        document.getElementById('meaning-modal').classList.remove('show');
    }

    function closeHintModal() {
        document.getElementById('hint-modal').classList.remove('show');
    }

    function updateUI() {
        document.getElementById('score-display').innerText = score;
        const hearts = document.querySelectorAll('.heart');
        hearts.forEach((h, i) => {
            if (i < lives) h.classList.remove('lost');
            else h.classList.add('lost');
        });
        
        // Disable hint button if all words found or game over
        const btnHint = document.getElementById('btn-hint');
        if (foundWords.length === wordData.length || lives <= 0) {
            btnHint.style.opacity = '0.5';
            btnHint.style.pointerEvents = 'none';
        } else {
            btnHint.style.opacity = '1';
            btnHint.style.pointerEvents = 'auto';
        }
    }

    function gameWin() {
        document.getElementById('game-over-modal').classList.add('show');
        document.getElementById('go-title').innerText = "🎉 恭喜發財！";
        document.getElementById('go-msg').innerText = "太厲害了！你找出了所有馬年吉祥成語！";
        document.getElementById('go-icon').className = "fas fa-trophy text-6xl text-yellow-400 mb-4";
        
        // Show AI Story Button
        document.getElementById('btn-ai-story').classList.remove('hidden');
    }

    function gameOver() {
        document.getElementById('game-over-modal').classList.add('show');
        document.getElementById('go-title').innerText = "💔 遊戲結束";
        document.getElementById('go-msg').innerText = "哎呀，愛心用光了。別氣餒，再試一次！";
        document.getElementById('go-icon').className = "fas fa-sad-tear text-6xl text-gray-400 mb-4";
        document.getElementById('btn-ai-story').classList.add('hidden');
    }

    function resetGame() {
        initGame();
    }

    window.onload = initGame;
</script>
</body>
</html>
